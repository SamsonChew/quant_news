 the large-scale curation, extraction, and deduplication of time-series datasets. The second, DeepScribe, is an autonomous presentation analyzer that converts visually dense, mathematically complex physics lectures into structured scientific reports. Through practical systems engineering-such as granular attribute extraction (Cellular RAG), remote data inspection, and distributed concurrency controls-we demonstrate how agentic AI can overcome the context and reasoning limitations of current state-of-the-art systems to rigorously support scientific workflows. Finally, we outline a generalization of DeepTS to support deep knowledge graphs and discuss the application of this conceptual approach to high-energy physics (DeepQCD).", "abstract": "This paper details two novel frameworks for developing autonomous, agentic AI in scientific workflows. Both systems leverage a hybrid Local Body, Remote Brain architecture via Google Colab, utilizing Python-based local orchestrators to invoke large language model (LLM) cloud backends. The first agent, DeepTS/DeepCollector, automates the large-scale curation, extraction, and deduplication of time-series datasets. The second, DeepScribe, is an autonomous presentation analyzer that converts visually dense, mathematically complex physics lectures into structured scientific reports. Through practical systems engineering-such as granular attribute extraction (Cellular RAG), remote data inspection, and distributed concurrency controls-we demonstrate how agentic AI can overcome the context and reasoning limitations of current state-of-the-art systems to rigorously support scientific workflows. Finally, we outline a generalization of DeepTS to support deep knowledge graphs and discuss the application of this conceptual approach to high-energy physics (DeepQCD).", "content_hash": "876c9e55fdf124f25e008bd61b35d1934d3e83769b9ceef0523cd3eac1349484", "category": "LLM / Agents for Quant", "tags": ["agent", "large language model", "llm", "rag", "reasoning"], "language": "en", "metadata": {"arxiv_categories": ["cs.AI", "eess.SY", "hep-ph"]}, "one_line_summary": "提出 DeepTS/DeepCollector 和 DeepScribe 两个科学智能体，但缺乏量化实验指标", "technical_summary": "1. 解决科学工作流中大规模数据采集、去重（DeepTS）和复杂演示文稿自动转化为结构化报告（DeepScribe）的问题。2. 采用本地编排器 + 云端 LLM（Google Colab）的混合架构，并通过 Cellular RAG、远程数据检查、分布式并发控制来增强。3. 未提供任何实验性能指标（如精度、召回、时间节省比例），仅描述系统设计。4. 提及将 DeepTS 推广到知识图谱和高能物理（DeepQCD），但无量化结果。", "key_points": ["DeepTS 自动化时间序列数据集清洗和去重，DeepScribe 将物理讲座转为结构化报告，均依赖 LLM 云端推理。", "基于 Google Colab + 本地 Python 编排器实现，代码依赖一般，但复现需自行搭建 LLM 后端，无公开数据集或 benchmark。", "论文全篇无任何量化指标（精度、速度、成本），纯架构描述，无法评估实用性，过拟合或样本外风险不可知。"], "quant_relevance": "研究工具/工作流提效：自动清洗时间序列和生成结构化报告，可支持量化研究中的数据处理和文档自动化。", "possible_use_case": "若进一步完善，DeepTS 可用于量化研究中的因子数据清洗和去重（如不同 API 来源的股票行情拼接），但当前无代码/性能验证，不宜直接采用。", "limitations": "原文缺乏量化证据，摘要基于纯系统设计描述；无实验对比、无样本外测试、无运行效率或成本数据；要求复现需自己构建 LLM 服务和数据，实现难度中等。", "read_priority": "低", "key_figures_md": "", "relevance_score": 9.0, "novelty_score": 9.565, "academic_score": 9.835, "discussion_score": 2.0, "actionable_score": 6.5, "final_score": 7.688, "display_title": "大模型、检索增强生成、杠杆、能源交易研究论文", "tldr": "提出 DeepTS/DeepCollector 和 DeepScribe 两个科学智能体，但缺乏量化实验指标", "core_value": "对你的量化工作帮助：把它拆成一个量化大模型 / 智能体复现任务，先验证大模型、检索增强生成、杠杆、能源交易是否真的带来样本外提升，再检查交易成本、数据泄漏和换手约束。", "key_points_list": ["DeepTS 自动化时间序列数据集清洗和去重，DeepScribe 将物理讲座转为结构化报告，均依赖 LLM 云端推理。", "基于 Google Colab + 本地 Python 编排器实现，代码依赖一般，但复现需自行搭建 LLM 后端，无公开数据集或 基准比较。", "论文全篇无任何量化指标（精度、速度、成本），纯架构描述，无法评估实用性，过拟合或样本外风险不可知。"], "reference_url": "http://arxiv.org/abs/2605.26305v1", "report_sections": ["ai_quant_tools"], "report_section_labels": ["AI 量化工具"], "category_label": "量化大模型 / 智能体", "priority_label": "低", "source_type_label": "论文"}, {"id": "6fb4b700bdbd55d323d99cdbf73d68a2d52a903aa83dee2606ef53b6760fc509", "source": "arXiv", "source_type": "paper", "title": "LC-ERD: Mining Latent Logic for Self-Evolving Reasoning via Consistency-Regulated Reward Decomposition", "url": "http://arxiv.org/abs/2605.24005v1", "authors": ["Yanyu Chen", "Jiyue Jiang", "Dianzhi Yu", "Zheng Wu", "Jiahong Liu", "Jiaming Han", "Xiao Guo", "Jinhu Qi", "Yu Li", "Yifei Zhang", "Irwin King"], "published_at": "2026-05-19", "collected_at": "2026-05-27T05:10:10Z", "raw_text": "The evolution of Large Language Model (LLM) reasoning is bottlenecked by the scarcity of high-quality process data. While self-alignment via endogenous rewards offers a solution, mining valid supervision faces three challenges: (1) Label Noise via Mimetic Bias, where rewards prioritize statistical likelihood over logical truth, creating a \"correctness illusion\" that masks compounding errors; (2) Coarse-Grained Supervision, where sparse global outcomes (e.g., in GRPO) fail to provide granular guidance, treating reasoning chains as monolithic; and (3) Distributional Collapse, where signals fail to generalize without amplifying pre-training biases. To address these, we introduce LC-ERD (Logic-Consistent Endogenous Reward Decomposition), a framework framing self-alignment as latent structure mining. We derive a Variational Logic Potential by aggregating consensus from the model's Latent Logic Expertise (LLE) to denoise the reasoning manifold, and introduce a Multi-Agent Value Decomposition protocol based on the IGM principle to quantify individual step utility. Experiments show LC-ERD delivers a robust self-evolution path, uncovering trade-offs between logic consistency and accuracy while identifying high-value reasoning patterns missed by standard rewards. Our code is available at https://github.com/Reinhardmannn/LC-ERD.", "abstract": "The evolution of Large Language Model (LLM) reasoning is bottlenecked by the scarcity of high-quality process data. While self-alignment via endogenous rewards offers a solution, mining valid supervision faces three challenges: (1) Label Noise via Mimetic Bias, where rewards prioritize statistical likelihood over logical truth, creating a \"correctness illusion\" that masks compounding errors; (2) Coarse-Grained Supervision, where sparse global outcomes (e.g., in GRPO) fail to provide granular guidance, treating reasoning chains as monolithic; and (3) Distributional Collapse, where signals fail to generalize without amplifying pre-training biases. To address these, we introduce LC-ERD (Logic-Consistent Endogenous Reward Decomposition), a framework framing self-alignment as latent structure mining. We derive a Variational Logic Potential by aggregating consensus from the model's Latent Logic Expertise (LLE) to denoise the reasoning manifold, and introduce a Multi-Agent Value Decomposition protocol based on the IGM principle to quantify individual step utility. Experiments show LC-ERD delivers a robust self-evolution path, uncovering trade-offs between logic consistency and accuracy while identifying high-value reasoning patterns missed by standard rewards. Our code is available at https://github.com/Reinhardmannn/LC-ERD.", "content_hash": "3566d0448b917f3b20a7436b2c987ad047678963b94487ce6f1883235a95a7b8", "category": "LLM / Agents for Quant", "tags": ["agent", "grpo", "large language model", "llm", "reasoning"], "language": "en", "metadata": {"arxiv_categories": ["cs.AI", "cs.CL"]}, "one_line_summary": "The evolution of Large Language Model (LLM) reasoning is bottlenecked by the scarcity of high-quality process data.", "technical_summary": "The evolution of Large Language Model (LLM) reasoning is bottlenecked by the scarcity of high-quality process data. While self-alignment via endogenous rewards offers a solution, mining valid supervision faces three challenges: (1) Label Noise via Mimetic Bias, where rewards prioritize statistical likelihood over logical truth, creating a \"correctness illusion\" that masks compounding errors; (2) Coarse-Grained Supervision, where sparse global outcomes (e.g., in GRPO) fail to provide granular guidance, treating reasoning chains as monolithic; and (3) Distributional Collapse, where signals fail to generalize without amplifying pre-training biases. To address these, we introduce LC-ERD (Logic-Consistent Endogenous Reward Decomposition), a framework framing self-alignment as latent structure mining. We derive a Variational Logic Potential by aggregating consensus from the model's Latent Log...", "key_points": ["The evolution of Large Language Model (LLM) reasoning is bottlenecked by the scarcity of high-quality process data.", "While self-alignment via endogenous rewards offers a solution, mining valid supervision faces three challenges: (1) Label Noise via Mimetic Bias, where rewards prioritize statisti...", "To address these, we introduce LC-ERD (Logic-Consistent Endogenous Reward Decomposition), a framework framing self-alignment as latent structure mining."], "quant_relevance": "和研究自动化、文档智能、代码智能体以及量化工作流工具相关。", "possible_use_case": "可以用于改进研究自动化、论文筛选或代码生成工作流。", "limitations": "需要检查数据可得性、交易成本、样本外鲁棒性，以及结果在真实执行假设下是否仍然成立。", "read_priority": "高", "key_figures_md": "", "relevance_score": 9.0, "novelty_score": 8.371, "academic_score": 10.0, "discussion_score": 2.0, "actionable_score": 7.5, "final_score": 7.674, "display_title": "大模型、多智能体研究论文", "tldr": "The evolution of Large Language Model (LLM) reasoning is bottlenecked by the scarcity of high-quality process data.", "core_value": "对你的量化工作帮助：把它拆成一个量化大模型 / 智能体复现任务，先验证大模型、多智能体是否真的带来样本外提升，再检查交易成本、数据泄漏和换手约束。", "key_points_list": ["The evolution of Large Language Model (LLM) reasoning is bottlenecked by the scarcity of high-quality process data.", "While self-alignment via endogenous rewards offers a solution, mining valid supervision faces three challenges: (1) Label Noise via Mimetic Bias, where rewards prioritize statisti...", "To address these, we introduce LC-ERD (Logic-Consistent Endogenous Reward Decomposition), a framework framing self-alignment as latent structure mining."], "reference_url": "http://arxiv.org/abs/2605.24005v1", "report_sections": ["ai_quant_tools"], "report_section_labels": ["AI 量化工具"], "category_label": "量化大模型 / 智能体", "priority_label": "高", "source_type_label": "论文"}, {"id": "f43af3ced648fc23ccb6fda4f5e7cb732e8970ba569fdb0d205838aa5ef5a017", "source": "arXiv", "source_type": "paper", "title": "From Index to Equity: Pre-Training Transformers for Stock Return Prediction", "url": "http://arxiv.org/abs/2605.23962v1", "authors": ["Marie Soehl Coolsaet", "Roberto Gallardo", "Zhen Gao"], "published_at": "2026-05-12", "collected_at": "2026-05-27T05:08:02Z", "raw_text": "This research aims to leverage machine learning to improve stock price prediction and support informed investment decisions related to buying, selling, and holding assets. Specifically, this work investigates transformer-based models for stock prediction and examines the impact of pre-training strategies on forecasting performance. A transformer model was first pre-trained on the Toronto Stock Exchange Index (TSX) to predict intra-day return direction and subsequently fine-tuned on individual TSX stocks. The model was further adapted for return-value regression tasks. Performance was benchmarked against Long Short-Term Memory (LSTM) and XGBoost models. Pre-training on the market index improved the binary cross-entropy loss for individual stock prediction from 0.69 to 0.64. The fine-tuned transformer regression model achieved lower mean squared error than the benchmark models, although the ensemble and XGBoost models achieved higher average daily returns. In addition, a practical application was developed to deliver real-time stock predictions for trading support. Future work will focus on increasing transformer model capacity, incorporating broader global technical indicators, and filtering out stocks with low predictability.", "abstract": "This research aims to leverage machine learning to improve stock price prediction and support informed investment decisions related to buying, selling, and holding assets. Specifically, this work investigates transformer-based models for stock prediction and examines the impact of pre-training strategies on forecasting performance. A transformer model was first pre-trained on the Toronto Stock Exchange Index (TSX) to predict intra-day return direction and subsequently fine-tuned on individual TSX stocks. The model was further adapted for return-value regression tasks. Performance was benchmarked against Long Short-Term Memory (LSTM) and XGBoost models. Pre-training on the market index improved the binary cross-entropy loss for individual stock prediction from 0.69 to 0.64. The fine-tuned transformer regression model achieved lower mean squared error than the benchmark models, although the ensemble and XGBoost models achieved higher average daily returns. In addition, a practical application was developed to deliver real-time stock predictions for trading support. Future work will focus on increasing transformer model capacity, incorporating broader global technical indicators, and filtering out stocks with low predictability.", "content_hash": "87ac305d1fdeab918b898bb255514aea03e7cf7560cf95231ec02f3a8fd8d453", "category": "Machine Learning for Finance", "tags": ["forecasting", "lstm", "machine learning", "predictability", "price prediction", "return prediction", "stock prediction", "transformer"], "language": "en", "metadata": {"arxiv_categories": ["q-fin.ST", "cs.LG"]}, "one_line_summary": "在 TSX 指数上预训练 Transformer，微调后个股收益方向预测交叉熵从 0.69 降至 0.64", "technical_summary": "1. 解决个股日内收益方向及数值预测问题。2. 使用 Transformer 模型先在 TSX 指数上预训练（预测指数收益方向），再微调至 TSX 个股。3. 二分类任务：预训练使交叉熵损失从 0.69 降至 0.64；回归任务：微调后 Transformer 的 MSE 低于 LSTM 和 XGBoost。4. 日均收益方面，集成模型和 XGBoost 表现更好。5. 开发了实时预测应用。", "key_points": ["预训练 Transformer 使个股收益方向预测交叉熵从 0.69 (无预训练) 降至 0.64，回归 MSE 低于 LSTM 和 XGBoost。", "数据要求为 TSX 指数和个股高频日内数据，模型基于标准 Transformer，使用 PyTorch 可复现，实现难度中等。", "仅在单一市场 (TSX) 测试，未考虑交易成本，日均收益不如 XGBoost，过拟合风险未充分评估。"], "quant_relevance": "因子/alpha 信号（收益方向预测信号）和深度学习工作流（预训练迁移框架可复用于其他市场）。", "possible_use_case": "构建加拿大股票日内方向性交易策略：先训练指数预训练模型，再微调至个股池，生成 0/1 方向信号，结合其他因子进行组合。", "limitations": "样本外仅 TSX 市场， guage model LLM agents can enhance renewable energy forecasting by integrating heterogeneous sensor streams weather API data historical generation records grid constraints and contextual reasoning into unified decision support workflows We survey classical forecasting methods statistical time series models deep learning architectures physics hybrid approaches and emerging LLM agent frameworks for explanation uncertainty communication and operator guidance A six layer taxonomy is proposed covering data acquisition preprocessing feature engineering model inference uncertainty estimation and natural language reporting The review identifies twelve open challenges spanning real time deployment model drift under distribution shift uncertainty quantification hallucination control in LLM agents interoperability of edge hardware and integration with energy management systems The paper concludes by recommending a research agenda centred on open benchmarks physics informed LLM grounding and federated forecasting architectures", "abstract": "Reliable forecasting of renewable energy generation is a foundational requirement for grid stability energy trading battery scheduling and carbon aware operational planning Solar and wind resources are inherently intermittent their output fluctuates with cloud cover wind speed atmospheric turbulence seasonal patterns and local terrain The proliferation of IoT and edge devices spanning smart meters inverters anemometers pyranometers weather stations and grid interface sensors has created an unprecedented volume of real time operational data that conventional forecasting pipelines are ill equipped to exploit fully This review investigates how large language model LLM agents can enhance renewable energy forecasting by integrating heterogeneous sensor streams weather API data historical generation records grid constraints and contextual reasoning into unified decision support workflows We survey classical forecasting methods statistical time series models deep learning architectures physics hybrid approaches and emerging LLM agent frameworks for explanation uncertainty communication and operator guidance A six layer taxonomy is proposed covering data acquisition preprocessing feature engineering model inference uncertainty estimation and natural language reporting The review identifies twelve open challenges spanning real time deployment model drift under distribution shift uncertainty quantification hallucination control in LLM agents interoperability of edge hardware and integration with energy management systems The paper concludes by recommending a research agenda centred on open benchmarks physics informed LLM grounding and federated forecasting architectures", "content_hash": "03f5ea4d75850fd5ccb4e2d88606eea67baa9919370c47d83c66aff41d407e5f", "category": "LLM / Agents for Quant", "tags": ["agent", "deep learning", "feature engineering", "forecasting", "large language model", "llm", "reasoning", "time series"], "language": "en", "metadata": {"arxiv_categories": ["cs.CL", "cs.AI"]}, "one_line_summary": "Reliable forecasting of renewable energy generation is a foundational requirement for grid stability energy trading battery scheduling and carbon aware operational planning Solar and wind resources are inherently interm...", "technical_summary": "Reliable forecasting of renewable energy generation is a foundational requirement for grid stability energy trading battery scheduling and carbon aware operational planning Solar and wind resources are inherently intermittent their output fluctuates with cloud cover wind speed atmospheric turbulence seasonal patterns and local terrain The proliferation of IoT and edge devices spanning smart meters inverters anemometers pyranometers weather stations and grid interface sensors has created an unprecedented volume of real time operational data that conventional forecasting pipelines are ill equipped to exploit fully This review investigates how large language model LLM agents can enhance renewable energy forecasting by integrating heterogeneous sensor streams weather API data historical generation records grid constraints and contextual reasoning into unified decision support workflows We s...", "key_points": ["Reliable forecasting of renewable energy generation is a foundational requirement for grid stability energy trading battery scheduling and carbon aware operational planning Solar...", "来源类型：论文。", "进入研究或生产前需要进一步人工复核。"], "quant_relevance": "和研究自动化、文档智能、代码智能体以及量化工作流工具相关。", "possible_use_case": "可以用于改进研究自动化、论文筛选或代码生成工作流。", "limitations": "需要检查数据可得性、交易成本、样本外鲁棒性，以及结果在真实执行假设下是否仍然成立。", "read_priority": "高", "key_figures_md": "", "relevance_score": 8.5, "novelty_score": 9.355, "academic_score": 10.0, "discussion_score": 2.0, "actionable_score": 6.5, "final_score": 7.521, "display_title": "深度学习、特征工程、预测、大模型研究论文", "tldr": "Reliable forecasting of renewable energy generation is a foundational requirement for grid stability energy trading battery scheduling and carbon aware operational planning Solar and wind resources are inherently interm...", "core_value": "对你的量化工作帮助：把它转成一个特征工程实验，对比原始价格特征、差分特征和分数阶差分特征，重点看平稳性、信息保留、样本外泛化和是否引入未来函数。", "key_points_list": ["内容抓手：分数阶差分试图让价格特征更平稳，同时保留一部分长期记忆，适合做特征工程消融实验。", "研究动作：比较原始价格、普通差分和分数阶差分特征在样本外预测、换手和成本后的表现。", "验证重点：确认平稳性提升不是未来数据泄漏，并检查参数选择对结果是否过度敏感。"], "reference_url": "http://arxiv.org/abs/2605.25141v1", "report_sections": ["ai_quant_tools"], "report_section_labels": ["AI 量化工具"], "category_label": "量化大模型 / 智能体", "priority_label": "高", "source_type_label": "论文"}, {"id": "3cc12c4e8c12294ca721471fc9c7e1a1e3fffe8f13e1d73bd057f57498ec8689", "source": "arXiv", "source_type": "paper", "title": "AME-TS: Anchored Mixture-of-Experts for Time Series Forecasting", "url": "http://arxiv.org/abs/2605.25166v1", "authors": ["Rui Wang", "Renhao Xue", "Ray Razi", "Huan Song", "Hannah R. Marlowe"], "published_at": "2026-05-24", "collected_at": "2026-05-27T05:09:11Z", "raw_text": "Time series forecasting models are increasingly scaled through large Transformer backbones, yet most existing approaches process all series through a shared dense computation path despite substantial heterogeneity in temporal structure. Mixture-of-Experts (MoE) offers a natural alternative by enabling conditional computation, but standard MoE routing leaves expert specialization weakly identified and often unstable during downstream adaptation. We propose AME-TS, a structure-guided sparse time series foundation model that aligns expert routing with interpretable temporal structure. AME-TS first uses a lightweight regime predictor to estimate series-level descriptors, including forecastability, seasonality, trend, and sparsity, and maps them to a soft structural prior over experts. This series-level prior guides token-level routing during training, encouraging structure-aligned specialization. On the GIFT-Eval benchmark, AME-TS delivers a strong accuracy-efficiency tradeoff across model scales: it substantially outperforms existing time series foundation models at small model scales and remains competitive with the strongest models at larger scales, while activating substantially fewer parameters through sparse routing. We further show that AME-TS learns more interpretable routing geometry and substantially more stable expert specialization than standard MoE during fine-tuning on the M5 dataset. These results suggest that structure-aware routing is an effective and reliable way to realize the benefits of sparse expert models for time series forecasting.", "abstract": "Time series forecasting models are increasingly scaled through large Transformer backbones, yet most existing approaches process all series through a shared dense computation path despite substantial heterogeneity in temporal structure. Mixture-of-Experts (MoE) offers a natural alternative by enabling conditional computation, but standard MoE routing leaves expert specialization weakly identified and often unstable during downstream adaptation. We propose AME-TS, a structure-guided sparse time series foundation model that aligns expert routing with interpretable temporal structure. AME-TS first uses a lightweight regime predictor to estimate series-level descriptors, including forecastability, seasonality, trend, and sparsity, and maps them to a soft structural prior over experts. This series-level prior guides token-level routing during training, encouraging structure-aligned specialization. On the GIFT-Eval benchmark, AME-TS delivers a strong accuracy-efficiency tradeoff across model scales: it substantially outperforms existing time series foundation models at small model scales and remains competitive with the strongest models at larger scales, while activating substantially fewer parameters through sparse routing. We further show that AME-TS learns more interpretable routing geometry and substantially more stable expert specialization than standard MoE during fine-tuning on the M5 dataset. These results suggest that structure-aware routing is an effective and reliable way to realize the benefits of sparse expert models for time series forecasting.", "content_hash": "0bf6dc3007f003967cf954c88edf2378fd5ecf5db8971d06f491dbabec46e451", "category": "Machine Learning for Finance", "tags": ["dataset", "forecasting", "foundation model", "routing", "time series", "transformer"], "language": "en", "metadata": {"arxiv_categories": ["cs.LG", "cs.AI"]}, "one_line_summary": "AME-TS 用结构引导的MoE做时间序列预测，小模型规模超越现有基础模型且激活参数更少", "technical_summary": "1. 现有时间序列模型用共享密集路径处理异质序列，忽略结构差异。2. 提出AME-TS，先用轻量级预测器估计系列级描述符（可预测性、季节性、趋势、稀疏性），生成结构先验指导token级专家路由。3. 在GIFT-Eval基准上，小模型规模显著优于现有时间序列基础模型，大模型规模与最强模型竞争力，同时激活参数更少。4. 在M5数据集微调中，路由几何更可解释，专家专业化更稳定。5. 原文未提供具体性能指标数字（如MSE、MAE），结论基于定性描述。", "key_points": ["在GIFT-Eval上，小模型规模性能优于现有基础模型，但原文未提供具体误差数值；激活参数显著更少。", "需估计序列特征（可预测性等），实现基于Transformer+MoE，预训练模型可复性取决于开源情况。", "仅在两个通用时间序列基准评估，缺乏金融领域对比；未考虑交易成本；样本外泛化需更多验证。"], "quant_relevance": "因子/alpha信号（改进时间序列预测精度）；研究工具（提供新的稀疏建模框架）", "possible_use_case": "可尝试在量化回测中替换现有的Transformer/LSTM预测模块，尤其是需要按时间序列结构（趋势/季节性）分组分配计算资源时。", "limitations": "原文未提供具体量化指标（误差、提升百分比），结论模糊；未公开代码；仅在非金融基准上测试；对金融数据噪声和低信噪比环境的适用性未知。", "read_priority": "中", "key_figures_md": "", "relevance_score": 7.8, "novelty_score": 9.355, "academic_score": 10.0, "discussion_score": 2.0, "actionable_score": 7.5, "final_score": 7.511, "display_title": "预测、时间序列、Transformer研究论文", "tldr": "AME-TS 用结构引导的MoE做时间序列预测，小模型规模超越现有基础模型且激活参数更少", "core_value": "对你的量化工作帮助：把它拆成一个金融机器学习复现任务，先验证预测、时间序列、Transformer 是否真的带来样本外提升，再检查交易成本、数据泄漏和换手约束。", "key_points_list": ["在GIFT-Eval上，小模型规模性能优于现有基础模型，但原文未提供具体误差数值；激活参数显著更少。", "需估计序列特征（可预测性等），实现基于 Transformer+MoE，预训练模型可复性取决于开源情况。", "仅在两个通用时间序列基准评估，缺乏金融领域对比；未考虑交易成本；样本外泛化需更多验证。"], "reference_url": "http://arxiv.org/abs/2605.25166v1", "report_sections": ["ai_quant_tools"], "report_section_labels": ["AI 量化工具"], "category_label": "金融机器学习", "priority_label": "中", "source_type_label": "论文"}, {"id": "6eb94e15a1f29a34e226602cee87c0d8e4f45e1fdaac671686ae54553a02d1cf", "source": "arXiv", "source_type": "paper", "title": "Falcon-X: A Time Series Foundation Model for Heterogeneous Multivariate Modeling", "url": "http://arxiv.org/abs/2605.27286v1", "authors": ["Yiding Liu", "Yifan Hu", "Hongjie Xia", "Peiyuan Liu", "Hongzhou Chen", "Xilin Dai", "Zewei Dong", "Jiang-Ming Yang"], "published_at": "2026-05-26", "collected_at": "2026-05-27T05:09:11Z", "raw_text": "Time series foundation models (TSFMs) are transforming the forecasting paradigm through large-scale cross-domain pretraining. However, most existing TSFMs remain univariate, and recent efforts to enable cross-variate modeling still operate directly within the raw variate space. This design introduces fundamental limitations in semantic alignment and relational expressivity. Specifically, raw-space group mixing lacks a dedicated mechanism to align heterogeneous physical quantities, while standard non-negative attention fails to capture the complex synergistic and antagonistic interactions ubiquitous in real-world systems. To address these challenges, we propose Falcon-X, decouples variates from the raw space and maps them into a unified latent prototype space. Falcon-X employs a Unified Prototype Diff-Attention mechanism that explicitly evaluates both positive and negative semantic affinities to explicitly align heterogeneous variates. Cross-variate interactions are then efficiently performed within this shared space via Latent Entity Attention, naturally facilitating zero-shot structural transfer. Finally, a Variate Reassembly Router robustly reconstructs variate-specific trajectories via a request-and-dispatch mechanism. Extensive evaluations on the GIFT-Eval and fev-bench benchmarks demonstrate that Falcon-X achieves state-of-the-art forecasting performance, offering a principled and scalable paradigm for complex multivariate environments. Falcon-X is publicly released to support future research.", "abstract": "Time series foundation models (TSFMs) are transforming the forecasting paradigm through large-scale cross-domain pretraining. However, most existing TSFMs remain univariate, and recent efforts to enable cross-variate modeling still operate directly within the raw variate space. This design introduces fundamental limitations in semantic alignment and relational expressivity. Specifically, raw-space group mixing lacks a dedicated mechanism to align heterogeneous physical quantities, while standard non-negative attention fails to capture the complex synergistic and antagonistic interactions ubiquitous in real-world systems. To address these challenges, we propose Falcon-X, decouples variates from the raw space and maps them into a unified latent prototype space. Falcon-X employs a Unified Prototype Diff-Attention mechanism that explicitly evaluates both positive and negative semantic affinities to explicitly align heterogeneous variates. Cross-variate interactions are then efficiently performed within this shared space via Latent Entity Attention, naturally facilitating zero-shot structural transfer. Finally, a Variate Reassembly Router robustly reconstructs variate-specific trajectories via a request-and-dispatch mechanism. Extensive evaluations on the GIFT-Eval and fev-bench benchmarks demonstrate that Falcon-X achieves state-of-the-art forecasting performance, offering a principled and scalable paradigm for complex multivariate environments. Falcon-X is publicly released to support future research.", "content_hash": "9004cd0477f92d435292559a5ebed04a39b82fc63a4f020545164fbcc3b5b4c6", "category": "Machine Learning for Finance", "tags": ["forecasting", "foundation model", "time series"], "language": "en", "metadata": {"arxiv_categories": ["cs.LG", "cs.AI"]}, "one_line_summary": "Falcon-X 时间序列基础模型通过统一原型潜空间实现异质多元预测，在 GIFT-Eval 和 fev-bench 上达到 SOTA", "technical_summary": "1. 现有时间序列基础模型多数是单变量的，多元模型直接在原始变量空间操作，难以对齐异质物理量且无法捕捉变量间的正负交互。2. Falcon-X 将每个变量从原始空间解耦，映射到统一潜在原型空间（原型数量可配置）。3. 使用统一原型差异注意力（Unified Prototype Diff-Attention）明确评估正负语义亲和度，实现异质变量对齐。4. 在共享潜空间中通过潜在实体注意力（Latent Entity Attention）进行跨变量交互，支持零样本结构迁移。5. 变量重组装路由器（Variate Reassembly Router）通过请求-调度机制重建各变量轨迹。6. 在 GIFT-Eval 和 fev-bench 两个多元时间序列基准上评估，声称达到 SOTA 性能，但摘要中未给出具体数字。", "key_points": ["核心方法：Falcon-X 引入统一原型潜空间和差异注意力机制，能显式建模变量间的正负关系，这是原始空间注意力做不到的。", "量化可用性：提供公开模型，可复现；但需要多变量时间序列数据，且原型数量等超参数需调优；金融数据通常在数万至数百万时间步，适用。", "局限性批判：原文缺乏具体量化指标（如 MSE 值、提升百分比），无法判断实际改进幅度；仅提到两个通用基准，未在金融领域数据集上验证，过拟合风险未知。"], "quant_relevance": "该模型可直接用于量化金融中的多资产或多因子时间序列预测，替换现有单变量或原始空间混合方法，提升信号精度和跨域迁移能力。", "possible_use_case": "可用于全市场股票日频因子合成，将多个因子作为变量输入 Falcon-X 预测未来收益率；也可用于跨资产波动率建模，利用零样本迁移能力从已训练领域迁移到新资产。", "limitations": "1. 论文摘要未提供任何具体数值，结论仅靠声称 SOTA 支撑，缺乏样本外金融数据验证。2. 未讨论计算成本和推理速度，大模型在实盘低频场景可能延迟可接受，但高频需评估。3. 金融时间序列的噪声和非平稳性可能削弱潜空间对齐效果，需独立复现。", "read_priority": "低", "key_figures_md": "- **Figure 1**：Falcon-X 整体架构：编码器将原始变量映射到原型空间，差异注意力和实体注意力模块，解码器重建输出\n- **Table 1**：在 GIFT-Eval 和 fev-bench 上的性能对比（具体数值未在摘要中给出，原文应有 MSE/MAE 等指标）\n- [原文图表（HTML版）](https://arxiv.org/html/2605.27286)", "releva on, controversy detection, portfolio management, and sustainability report analysis. By synthesizing findings from the recent literature, a framework emerges on AI-powered sustainable finance that identifies technological applications to overcome ESG data barriers.", "abstract": "The integration of Artificial Intelligence into sustainable finance represents a transformative paradigm shift in how Environmental, Social, and Governance factors are analyzed, predicted, and incorporated into investment decisions. This review provides a comprehensive taxonomy of AI approaches applicable to sustainable investment decision-making, categorizing methodologies based on their underlying algorithms and their impact on ESG-related financial processes. The proposed AI Taxonomy includes machine learning paradigms -- including supervised, unsupervised, and reinforcement learning -- as well as natural language processing techniques and optimization algorithms, examining their specific applications in ESG score prediction, controversy detection, portfolio management, and sustainability report analysis. By synthesizing findings from the recent literature, a framework emerges on AI-powered sustainable finance that identifies technological applications to overcome ESG data barriers.", "content_hash": "010575391e05a730ce6b16b808066e245e1dd92771a606ff4faeafbe9ac3db17", "category": "Portfolio Construction", "tags": ["machine learning", "optimization", "portfolio", "reinforcement learning"], "language": "en", "metadata": {"arxiv_categories": ["cs.CE"]}, "one_line_summary": "The integration of Artificial Intelligence into sustainable finance represents a transformative paradigm shift in how Environmental, Social, and Governance factors are analyzed, predicted, and incorporated into investme...", "technical_summary": "The integration of Artificial Intelligence into sustainable finance represents a transformative paradigm shift in how Environmental, Social, and Governance factors are analyzed, ate that while the LSTM demonstrates higher precision through a conservative safe-bet strategy, the Transformer model exhibits superior sensitivity in identifying volatile movements, achieving a higher macro F1-score, with ablation experiments showing a consistent benefit from incorporating news sentiment.", "abstract": "Predicting stock price movements during Earnings Announcements (EAs) is a significant challenge due to market noise and high-impact price discontinuities. In this study, we evaluate whether pre-announcement news sentiment, firm fundamentals, and recent market dynamics jointly predict the directional price movement of equities on EA days. We construct a multi-modal feature space combining 15 fundamental metrics, 3 price-based technical indicators and sentiment scores derived from financial news articles processed using FinBERT. We compare a Long Short-Term Memory (LSTM) network and a Transformer-based architecture against a logistic regression baseline, and further assess all models with and without sentiment features to quantify their incremental value. Our results indicate that while the LSTM demonstrates higher precision through a conservative safe-bet strategy, the Transformer model exhibits superior sensitivity in identifying volatile movements, achieving a higher macro F1-score, with ablation experiments showing a consistent benefit from incorporating news sentiment.", "content_hash": "7020e1ee43c418ebe158f7a20229b19e21e3196ca87a252ed1987976dc92a80f", "category": "Machine Learning for Finance", "tags": ["deep learning", "lstm", "transformer"], "language": "en", "metadata": {"arxiv_categories": ["cs.LG", "q-fin.ST"]}, "one_line_summary": "Predicting stock price movements during Earnings Announcements (EAs) is a significant challenge due to market noise and high-impact price discontinuities.", "technical_summary": "Predicting stock price movements during Earnings Announcements (EAs) is a significant challenge due to market noise and high-impact p es.", "In this study, we evaluate whether pre-announcement news sentiment, firm fundamentals, and recent market dynamics jointly predict the directional price movement of equities on EA...", "We construct a multi-modal feature space combining 15 fundamental metrics, 3 price-based technical indicators and sentiment scores derived from financial news articles processed u..."], "reference_url": "http://arxiv.org/abs/2605.25894v1", "report_sections": ["deep_learning_quant"], "report_section_labels": ["深度学习量化未来"], "category_label": "金融机器学习", "priority_label": "中", "source_type_label": "论文"}, {"id": "1cd6cea9235c9fede251c26821565094d8801b06ff769a45cfa925cd7203baaf", "source": "arXiv", "source_type": "paper", "title": "Explicit Signal-Adaptive Sequential Optimal Execution Quotes", "url": "http://arxiv.org/abs/2605.24242v1", "authors": ["Fenghui Yu"], "published_at": "2026-05-22", "collected_at": "2026-05-27T05:08:13Z", "raw_text": "This paper develops a unified explicit solution theory for optimal execution through sequential limit-order placement in a limit order book. Rather than controlling only the trading speed of a metaorder, we determine how individual limit orders should be quoted over time. The model incorporates signal-dependent drift, price impact, inventory risk, and execution risk, with fills modeled by point processes whose intensities depend on the submitted quotes. We formulate four execution criteria: expected terminal wealth, expected terminal wealth with running inventory penalty, CARA utility of terminal wealth, and CARA utility with running inventory penalty. For general price-impact and inventory-penalty functions, we derive the corresponding HJB equations and show that all four problems reduce to a triangular finite-dimensional structure which can be solved explicitly, leading to fully explicit value functions and optimal quotes across all cases. We also prove well-posedness, admissibility, and verification results. The explicit formulas reveal connections between quoting strategies under different criteria, support long-horizon asymptotic analysis, and show numerically that signal-dependent drift can substantially affect optimal execution.", "abstract": "This paper develops a unified explicit solution theory for optimal execution through sequential limit-order placement in a limit order book. Rather than controlling only the trading speed of a metaorder, we determine how individual limit orders should be quoted over time. The model incorporates signal-dependent drift, price impact, inventory risk, and execution risk, with fills modeled by point processes whose intensities depend on the submitted quotes. We formulate four execution criteria: expected terminal wealth, expected terminal wealth with running inventory penalty, CARA utility of terminal wealth, and CARA utility with running inventory penalty. For general price-impact and inventory-penalty functions, we derive the corresponding HJB equations and show that all four problems reduce to a triangular finite-dimensional structure which can be solved explicitly, leading to fully explicit value functions and optimal quotes across all cases. We also prove well-posedness, admissibility, and verification results. The explicit formulas reveal connections between quoting strategies under different criteria, support long-horizon asymptotic analysis, and show numerically that signal-dependent drift can substantially affect optimal execution.", "content_hash": "c497364ca0b51595e6be243fbcee1bb843c0809c4685acc151dd4ec55a44c60c", "category": "Market Microstructure", "tags": ["execution", "limit order book", "order book", "price impact", "risk", "signal"], "language": "en", "metadata": {"arxiv_categories": ["q-fin.TR", "math.OC", "q-fin.MF"]}, "one_line_summary": "This paper develops a unified explicit solution theory for optimal execution through sequential limit-order placement in a limit order book.", "technical_summary": "This paper develops a unified explicit soluti   <script>
    const payload = JSON.parse(document.getElementById('dashboard-data').textContent);
    const items = payload.items || [];
    const categoryLabels = payload.category_labels || {};
    const priorityLabels = payload.priority_labels || {};
    const sourceTypeLabels = payload.source_type_labels || {};
    const state = {
      query: '',
      section: 'All',
      category: 'All',
      sort: 'score',
      activeId: items[0]?.id || null,
    };

    const priorityRank = { High: 3, Medium: 2, Low: 1, '高': 3, '中': 2, '低': 1 };
    const $ = (id) => document.getElementById(id);

    // --- Feedback ---
    const _feedbackStore = JSON.parse(localStorage.getItem('quant-feedback') || '{}');
    function getFeedback(id) { return _feedbackStore[id] || 0; }
    function setFeedback(id, signal) {
      if (_feedbackStore[id] === signal) { delete _feedbackStore[id]; signal = 0; }
      else { _feedbackStore[id] = signal; }
      localStorage.setItem('quant-feedback', JSON.stringify(_feedbackStore));
      fetch('http://localhost:8080/feedback', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, signal }),
      }).catch(() => {});
    }

    function init() {
      $('report-date').textContent = payload.report_date + ' - 主力源：arXiv / 知乎 / QuantML / 大型论坛 - 生成时间 ' + payload.generated_at;
      $('metric-items').textContent = items.length;
      $('metric-categories').textContent = new Set(items.map((item) => item.category)).size;
      $('metric-high').textContent = items.filter((item) => priorityLabel(item.read_priority) === '高').length;
      $('metric-avg').textContent = averageScore(items).toFixed(1);

      buildSectionControls();
      buildCategoryControls();
      buildSourceList();
      bindControls();
      render();
    }

    function bindControls() {
      $('search').addEventListener('input', (event) => {
        state.query = event.target.value.trim().toLowerCase();
        render();
      });
      $('category-select').addEventListener('change', (event) => {
        state.category = event.target.value;
        render();
      });
      $('section-select').addEventListener('change', (event) => {
        state.section = event.target.value;
        render();
      });
      $('sort-select').addEventListener('change', (event) => {
        state.sort = event.target.value;
        render();
      });
    }

    function buildCategoryControls() {
      const counts = countBy(items, 'category');
      const categories = Object.keys(counts).sort();
      const select = $('category-select');
      select.innerHTML = option('All', `全部细分标签 (${items.length})`) +
        categories.map((category) => option(category, `${categoryLabel(category)} (${counts[category]})`)).join('');

      const list = $('category-list');
      list.innerHTML = categoryButton('All', items.length) +
        categories.map((category) => categoryButton(category, counts[category])).join('');

      list.querySelectorAll('button').forEach((button) => {
        button.addEventListener('click', () => {
          state.category = button.dataset.category;
          select.value = state.category;
          if (state.category === 'All') {
            state.section = 'All';
            $('section-select').value = 'All';
          }
          render();
        });
      });
    }

    function buildSectionControls() {
      const counts = payload.section_counts || {};
      const sections = payload.sections || [];
      const select = $('section-select');
      select.innerHTML = option('All', `全部主线 (${items.length})`) +
        sections
          .filter((section) => counts[section.key])
          .map((section) => option(section.key, `${section.label} (${counts[section.key]})`))
          .join('');

      const list = $('section-list');
      list.innerHTML = sectionButton('All', '全部', items.length) +
        sections
          .filter((section) => counts[section.key])
          .map((section) => sectionButton(section.key, section.label, counts[section.key]))
          .join('');

      list.querySelectorAll('button').forEach((button) => {
        button.addEventListener('click', () => {
          state.section = button.dataset.section;
          select.value = state.section;
          if (state.section === 'All') {
            state.category = 'All';
            $('category-select').value = 'All';
          }
          render();
        });
      });
    }

    function buildSourceList() {
      const stats = payload.source_stats || {};
      const entries = Object.entries(stats)
        .filter(([source]) => !source.startsWith('fetched:'))
        .sort((a, b) => b[1] - a[1]);
      $('source-list').innerHTML = entries.length
        ? entries.map(([source, count]) => `<li><span>${escapeHtml(source)}</span><b>${count}</b></li>`).join('')
        : '<li><span>暂无来源统计</span><b>0</b></li>';
    }

    function render() {
      let visible = items.filter(matchesFilters);
      visible = sortItems(visible);
      if (!visible.some((item) => item.id === state.activeId)) {
        state.activeId = visible[0]?.id || null;
      }

      $('feed-title').textContent = feedTitle();
      $('result-count').textContent = `展示 ${visible.length} 条 - 两条主线每条最多 ${payload.report_config.max_items_per_category} 条`;
      renderSectionActive();
      renderCategoryActive();
      renderItems(visible);
      renderDetail(visible.find((item) => item.id === state.activeId) || visible[0]);
    }

    function matchesFilters(item) {
      const sectionMatch = state.section === 'All' || (item.report_sections || []).includes(state.section);
      if (!sectionMatch) return false;
      const categoryMatch = state.category === 'All' || item.category === state.category;
      if (!categoryMatch) return false;
      if (!state.query) return true;
      const haystack = [
        item.title,
        item.display_title,
        item.source,
        item.source_type,
        item.category,
        categoryLabel(item.category),
        sectionLabel(item.report_sections?.[0]),
        sourceTypeLabel(item.source_type),
        priorityLabel(item.read_priority),
        item.one_line_summary,
        item.technical_summary,
        item.quant_relevance,
        item.possible_use_case,
        item.tldr,
        item.core_value,
        ...(item.key_points_list || []),
        item.reference_url,
      ].join(' ').toLowerCase();
      return haystack.includes(state.query);
    }

    function sortItems(list) {
      return [...list].sort((a, b) => {
        if (state.sort === 'priority') {
          return (priorityRank[b.read_priority] || 0) - (priorityRank[a.read_priority] || 0)
            || b.final_score - a.final_score;
        }
        if (state.sort === 'source') {
          return a.source.localeCompare(b.source) || b.final_score - a.final_score;
        }
        return b.final_score - a.final_score;
      });
    }

    function renderCategoryActive() {
      document.querySelectorAll('.category-button').forEach((button) => {
        button.classList.toggle('active', button.dataset.category === state.category);
      });
    }

    function renderSectionActive() {
      document.querySelectorAll('.section-button').forEach((button) => {
        button.classList.toggle('active', button.dataset.section === state.section);
      });
    }

    function itemCard(item) {
      const sec = item.report_sections?.[0] || 'other';
      const sig = getFeedback(item.id);
      return `
        <article class="item ${item.id === state.activeId ? 'active' : ''}"
                 data-id="${escapeAttr(item.id)}"
                 data-section="${escapeAttr(sec)}">
          <div class="item-top">
            <h3>${escapeHtml(item.display_title || item.title)}</h3>
            <div class="score">${Number(item.final_score).toFixed(1)}</div>
          </div>
          <div class="meta">
            <span class="tag">${escapeHtml(categoryLabel(item.category))}</span>
            <span class="tag">${escapeHtml(item.source)}</span>
            <span class="tag">${escapeHtml(priorityLabel(item.read_priority))}</span>
          </div>
          ${readerFormat(item, true)}
          <div class="feedback-row">
            <button class="feedback-btn ${sig === 1 ? 'active-up' : ''}" data-feedback="1" title="有用">👍</button>
            <button class="feedback-btn ${sig === -1 ? 'active-down' : ''}" data-feedback="-1" title="跳过">👎</button>
            <span class="feedback-hint">${sig === 1 ? '已标记有用' : sig === -1 ? '已标记跳过' : ''}</span>
          </div>
        </article>
      `;
    }

    function sectionGroupHeader(section, count) {
      return `
        <div class="section-group-header" data-section="${escapeAttr(section.key)}">
          <span class="section-group-title">${escapeHtml(section.label)}</span>
          <span class="section-group-count">${count} 条</span>
        </div>
      `;
    }

    function renderItems(visible) {
      const container = $('items');
      if (!visible.length) {
        container.innerHTML = '<div class="empty">当前筛选条件下没有匹配内容。</div>';
        return;
      }

      let html = '';
      if (state.section === 'All') {
        // Group by section in defined order, with a header for each group
        const grouped = {};
        for (const item of visible) {
          const sec = item.report_sections?.[0] || 'other';
          if (!grouped[sec]) grouped[sec] = [];
          grouped[sec].push(item);
        }
        for (const section of (payload.sections || [])) {
          const group = grouped[section.key];
          if (!group || !group.length) continue;
          html += sectionGroupHeader(section, group.length);
          html += group.map((item) => itemCard(item)).join('');
        }
        // Append any items that fell into 'other' (shouldn't normally happen)
        if (grouped['other']?.length) {
          html += grouped['other'].map((item) => itemCard(item)).join('');
        }
      } else {
        html = visible.map((item) => itemCard(item)).join('');
      }

      container.innerHTML = html;
      container.querySelectorAll('.item').forEach((node) => {
        node.addEventListener('click', () => {
          state.activeId = node.dataset.id;
          render();
        });
      });
      container.querySelectorAll('.feedback-btn').forEach((btn) => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const itemNode = btn.closest('.item');
          setFeedback(itemNode.dataset.id, parseInt(btn.dataset.feedback, 10));
          render();
        });
      });
    }

    function renderDetail(item) {
      const detail = $('detail');
      if (!item) {
        detail.innerHTML = '<div class="empty">选择一条内容查看详情。</div>';
        return;
      }

      detail.innerHTML = `
        <h2>${escapeHtml(item.display_title || item.title)}</h2>
        <div class="meta">
          <span class="tag">${escapeHtml(categoryLabel(item.category))}</span>
          <span class="tag">${escapeHtml(sourceTypeLabel(item.source_type))}</span>
          <span class="tag">${escapeHtml(priorityLabel(item.read_priority))}</span>
        </div>

        ${readerFormat(item, false)}

        <div class="detail-block">
          <h3>评分拆解</h3>
          <div class="breakdown">
            ${bar('相关性', item.relevance_score)}
            ${bar('新颖度', item.novelty_score)}
            ${bar('学术性', item.academic_score)}
            ${bar('讨论度', item.discussion_score)}
            ${bar('可行动性', item.actionable_score)}
          </div>
        </div>

      `;
    }

    function readerFormat(item, compact) {
      const points = itemKeyPoints(item);
      return `
        <div class="reader-format ${compact ? 'compact' : ''}">
          <div class="reader-block">
            <h4>1. 这篇文章的太长不读</h4>
            <p>${escapeHtml(item.tldr || item.one_line_summary || '')}</p>
          </div>
          <div class="reader-block">
            <h4>2. 核心价值，对我量化的工作能够提供什么样的帮助</h4>
            <p>${escapeHtml(item.core_value || '')}</p>
          </div>
          <div class="reader-block">
            <h4>3. 关键核心点 / 论文或帖子摘要</h4>
            <ol>${points.map((point) => `<li>${escapeHtml(point)}</li>`).join('')}</ol>
          </div>
          <div class="reader-block">
            <h4>4. 原文链接</h4>
            ${referenceHtml(item)}
          </div>
        </div>
      `;
    }

    function itemKeyPoints(item) {
      const points = Array.isArray(item.key_points_list)
        ? item.key_points_list
        : (Array.isArray(item.key_points) ? item.key_points : []);
      const clean = points.filter(Boolean).slice(0, 3);
      return clean.length ? clean : ['需要打开原文进一步确认方法、数据和适用边界。'];
    }

    function referenceHtml(item) {
      const url = item.reference_url || '';
      if (!url) return '<p>暂无可打开链接</p>';
      return `
        <a class="reader-reference" href="${escapeAttr(url)}" target="_blank" rel="noopener noreferrer">打开原文</a>
        <small class="reference-url">${escapeHtml(url)}</small>
      `;
    }

    function bar(label, value) {
      const score = Number(value || 0);
      const width = Math.max(0, Math.min(100, score * 10));
      return `
        <div class="bar">
          <span>${label}</span>
          <div class="bar-track"><div class="bar-fill" style="width: ${width}%"></div></div>
          <b>${score.toFixed(1)}</b>
        </div>
      `;
    }

    function countBy(list, key) {
      return list.reduce((acc, item) => {
        acc[item[key]] = (acc[item[key]] || 0) + 1;
        return acc;
      }, {});
    }

    function averageScore(list) {
      if (!list.length) return 0;
      return list.reduce((sum, item) => sum + Number(item.final_score || 0), 0) / list.length;
    }

    function option(value, label) {
      return `<option value="${escapeAttr(value)}">${escapeHtml(label)}</option>`;
    }

    function sectionButton(section, label, count) {
      return `
        <button class="category-button section-button" type="button" data-section="${escapeAttr(section)}">
          <span>${escapeHtml(label)}</span>
          <span class="count">${count}</span>
        </button>
      `;
    }

    function categoryButton(category, count) {
      return `
        <button class="category-button" type="button" data-category="${escapeAttr(category)}">
          <span>${escapeHtml(category === 'All' ? '全部' : categoryLabel(category))}</span>
          <span class="count">${count}</span>
        </button>
      `;
    }

    function categoryLabel(category) {
      return categoryLabels[category] || category;
    }

    function sectionLabel(sectionKey) {
      const section = (payload.sections || []).find((item) => item.key === sectionKey);
      return section ? section.label : '其他';
    }

    function feedTitle() {
      const parts = [];
      if (state.section !== 'All') parts.push(sectionLabel(state.section));
      if (state.category !== 'All') parts.push(categoryLabel(state.category));
      return parts.length ? parts.join(' / ') : '今日情报';
    }

    function priorityLabel(priority) {
      return priorityLabels[priority] || priority;
    }

    function sourceTypeLabel(sourceType) {
      return sourceTypeLabels[sourceType] || sourceType;
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function escapeAttr(value) {
      return escapeHtml(value).replaceAll('`', '&#096;');
    }

    init();
  </script>
</body>
</html>
