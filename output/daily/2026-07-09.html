ax DD: roughly mid/high 20% range 95th percentile max DD: roughly mid/high 30% range Worst sampled max DD: around 60% So the historical equity curve may have benefited from a favorable trade order. My current interpretation The EMA pullback idea may have some edge, but I would not call it production-ready yet. The two main issues are: 2022-style bear/chop regimes Monte Carlo path risk Next ideas Reduce position size from 75% to 50–60%. Add a bear-regime filter, such as higher-timeframe trend, 200 EMA slope, or volatility/risk-off filter. Re-run walk-forward and Monte Carlo after those changes. Questions Would you continue researching this, or would the 2022 failure be enough to discard it? How seriously would you take the Monte Carlo drawdown issue here? Would you reduce sizing first, add a regime filter first, or redesign the system? What robustness checks would you run next before paper trading? submitted by /u/howtiq [link] [comments]", "content_hash": "480665e0c6311064752b6cfde9d595ef887c5e9fe536b8bebd6029d8b63fb748", "category": "Risk Management", "tags": ["backtest", "drawdown", "exposure", "factor", "risk", "slippage", "volatility"], "language": "en", "metadata": {"feed_url": "https://www.reddit.com/r/algotrading/.rss"}, "one_line_summary": "BTC 3H EMA回踩策略经全面鲁棒性测试后显示蒙特卡洛最大回撤可达60%，需加入熊市过滤器", "technical_summary": "社区讨论了一个简单的BTC 3H EMA回踩策略（长多，34/120/200参数）的完整测试流程，包括全期回测（净回报+1843%，最大回撤18.37%，PF 2.33）、WFA（6个OOS窗口5个盈利，但2022年失败）、参数敏感性（27个邻近组合均盈利，PF>2.07）、成本压力（0.5%佣金+滑点下收益降至445%，PF 1.54）和蒙特卡洛模拟（历史最大回撤18%，但随机化后95分位数回撤达30%+，最差60%）。主流观点认为策略可能有一些边缘alpha，但历史路径过于幸运，不能直接用于实盘，需要减少仓位并添加熊市过滤器。", "key_points": ["尽管全期回测表现亮眼（1843%收益，18%最大回撤），蒙特卡洛显示历史交易次序有利，随机化后最大回撤可飙升至60%，路径风险极大。", "作者建议将仓位从75%降至50–60%，并增加熊市过滤器（如200 EMA斜率或波动率指标），之后再重新进行WFA和蒙特卡洛验证。", "策略在2022年熊市亏损26%，成本压力测试中极端假设（0.5%佣金+滑点）已使PF降至1.54，未考虑流动性成本和交易冲击，实盘风险更高。"], "quant_relevance": "风险建模 – 蒙特卡洛揭示路径风险；执行/交易成本 – 成本压力测试显示在高佣金/滑点下夏普显著下降", "possible_use_case": "可直接作为加密货币趋势跟踪策略的基线，按照作者建议的改进方向（降仓+熊市过滤器）调整后，在币安或币coin上进行实盘模拟。", "limitations": "仅基于BTCUSD单一品种2019–2026历史数据，蒙特卡洛随机化假设独立同分布交易，未考虑市场流动性、下单执行滑点和手续费动态变化，社区讨论需要实盘验证。", "read_priority": "高", "key_figures_md": "", "relevance_score": 8.0, "novelty_score": 9.78, "academic_score": 5.5, "discussion_score": 3.0, "actionable_score": 5.5, "final_score": 6.731, "display_title": "回测、回撤、因子、风险实践讨论", "tldr": "BTC 3H EMA回踩策略经全面鲁棒性测试后显示蒙特卡洛最大回撤可达60%，需加入熊市过滤器", "core_value": "对你的量化工作帮助：把它当作回测、回撤、因子、风险的实盘经验线索，用来补充回测假设、交易成本假设或风控检查清单。", "key_points_list": ["尽管全期回测表现亮眼（1843%收益，18%最大回撤），蒙特卡洛显示历史交易次序有利，随机化后最大回撤可飙升至60%，路径风险极大。", "作者建议将仓位从75%降至50–60%，并增加熊市过滤器（如200 EMA斜率或波动率指标），之后再重新进行WFA和蒙特卡洛验证。", "策略在2022年熊市亏损26%，成本压力测试中极端假设（0.5%佣金+滑点）已使PF降至1.54，未考虑流动性成本和交易冲击，实盘风险更高。"], "reference_url": "https://www.reddit.com/r/algotrading/comments/1uqlxiz/feedback_wanted_on_btc_3h_ema_pullback_strategy/", "report_sections": ["ai_quant_tools"], "report_section_labels": ["AI 量化工具"], "category_label": "风险管理", "priority_label": "高", "source_type_label": "论坛"}, {"id": "30ab6b8a8df5bbba5e00e7e9c9d18859b88bab6dd12dd73a39176fac6d9907e8", "source": "arXiv", "source_type": "paper", "title": "EvalLoop: A Methodology for Evaluation-Driven Iterative Improvement of Business AI Systems", "url": "http://arxiv.org/abs/2607.05638v1", "authors": ["Kenneth Benavides", "Josh Fleischer", "Danti Chen"], "published_at": "2026-07-06", "collected_at": "2026-07-09T00:09:12Z", "raw_text": "Teams deploying large language models in business contexts need evaluation systems, yet most treat evaluation as static model selection: run benchmarks, rank models, deploy the winner. This framing misses evaluation's primary value for production systems--diagnosing why a system underperforms and guiding what to fix. We present EvalLoop, a methodology for evaluation-driven iterative improvement. EvalLoop organizes evaluation around three mechanisms: (1) dimensional metric grouping that decomposes quality into business-relevant dimensions enabling orthogonal failure diagnosis; (2) failure mode classification that categorizes why outputs fail within weak dimensions, bridging diagnosis to action; and (3) a structured iteration workflow where each evaluation run varies one system variable and compares dimensional profiles before and after. We validate EvalLoop through a case study on sales intelligence briefing generation (10 models, 3 providers, 18 metrics, 5 dimensions, 3 iterations). Dimensional diagnosis identified that 69% of hallucination failures were prompt-induced interpretation errors--invisible in aggregate scoring. A targeted prompt fix improved the best model from 82.6% to 94.6% overall, with improvement concentrated in diagnosed dimensions (Content Accuracy +16.8pp, Synthesis Power +26.4pp). An undirected configuration change in a prior iteration produced zero impact, illustrating the cost of iterating without diagnosis. We additionally demonstrate that dimensional profiling enables deployment-specific model selection, and that a one-time blind human gate on a finalist panel (4 models, 16 cases) confirms dimensional rankings while resolving multi-criteria deployment trade-offs--a 94% reduction in review burden compared to evaluating the full design. EvalLoop is packaged as reusable artifacts (playbook, agent specification, template repository) for adoption by other teams.", "abstract": "Teams deploying large language models in business contexts need evaluation systems, yet most treat evaluation as static model selection: run benchmarks, rank models, deploy the winner. This framing misses evaluation's primary value for production systems--diagnosing why a system underperforms and guiding what to fix. We present EvalLoop, a methodology for evaluation-driven iterative improvement. EvalLoop organizes evaluation around three mechanisms: (1) dimensional metric grouping that decomposes quality into business-relevant dimensions enabling orthogonal failure diagnosis; (2) failure mode classification that categorizes why outputs fail within weak dimensions, bridging diagnosis to action; and (3) a structured iteration workflow where each evaluation run varies one system variable and compares dimensional profiles before and after. We validate EvalLoop through a case study on sales intelligence briefing generation (10 models, 3 providers, 18 metrics, 5 dimensions, 3 iterations). Dimensional diagnosis identified that 69% of hallucination failures were prompt-induced interpretation errors--invisible in aggregate scoring. A targeted prompt fix improved the best model from 82.6% to 94.6% overall, with improvement concentrated in diagnosed dimensions (Content Accuracy +16.8pp, Synthesis Power +26.4pp). An undirected configuration change in a prior iteration produced zero impact, illustrating the cost of iterating without diagnosis. We additionally demonstrate that dimensional profiling enables deployment-specific model selection, and that a one-time blind human gate on a finalist panel (4 models, 16 cases) confirms dimensional rankings while resolving multi-criteria deployment trade-offs--a 94% reduction in review burden compared to evaluating the full design. EvalLoop is packaged as reusable artifacts (playbook, agent specification, template repository) for adoption by other teams.", "content_hash": "b2f17414e89bda55f39663a3bd4dbdcce06488776d7eb9b0b2a27aeb68a92ab4", "category": "LLM / Agents for Quant", "tags": ["agent", "prompt"], "language": "en", "metadata": {"arxiv_categories": ["cs.SE", "cs.AI"]}, "one_line_summary": "EvalLoop 评估驱动迭代方法：通过维度诊断将 LLM 模型评分从 82.6% 提升至 94.6%", "technical_summary": "1. 现有 LLM 评估仅做静态模型选择，忽略了诊断和迭代改进的价值。2. EvalLoop 提出三个机制：维度化指标分组（将质量拆解为业务相关维度，如内容准确度、合成能力）、失败模式分类（在弱维度内分类失败原因）、结构化迭代（每次只改一个变量并对比维度剖面）。3. 在销售智能简报案例（10 模型、3 提供商、18 指标、5 维度、3 迭代）中验证：维度诊断发现 69% 的幻觉失败是提示解释错误，针对修复后最佳模型从 82.6% 提升至 94.6%，内容准确度提高 16.8 百分点，合成能力提高 26.4 百分点。4. 未诊断的盲目迭代零收益；最终盲审负担降低 94%。", "key_points": ["核心发现：维度化诊断可识别 LLM 输出中隐蔽的失败模式（69% 幻觉由提示引起），针对性修复带来评分显著提升（82.6%→94.6%）。", "量化可用性：需要预定义业务相关维度和指标，提供可复用的 playbook 和 agent 模板，但需投入初始维度设计工作。", "局限性：仅在一个商业案例（销售简报）上验证，通用性待检验；维度定义依赖人工经验，可能引入主观偏差；未涉及量化金融场景。"], "quant_relevance": "研究工具 / 工作流提效：为量化团队评估和迭代 LLM 驱动的因子挖掘、策略生成或报告自动化提供结构化评估框架。", "possible_use_case": "可嵌入量化团队 LLM 应用开发流程：为因子挖掘 LLM agent 定义维度（如因子逻辑一致性、回测稳定性、可解释性），定期迭代提示或检索策略。", "limitations": "案例单一（销售智能）、维度定义人工化、未在量化金融数据上验证、依赖已有任务定义和评估指标、群体盲审成本未在量化场景测度。", "read_priority": "中", "key_figures_md": "- **Figure 1**：EvalLoop 整体框架图示：维度分组、失败分类、迭代工作流\n- **Table 2**：三次迭代中各维度评分变化（Overall, Content Accuracy, Synthesis Power）\n- [原文图表（HTML版）](https://arxiv.org/html/2607.05638)", "relevance_score": 5.4, "novelty_score": 9.355, "academic_score": 10.0, "discussion_score": 2.0, "actionable_score": 6.5, "final_score": 6.591, "display_title": "大模型、人工智能研究论文", "tldr": "EvalLoop 评估驱动迭代方法：通过维度诊断将 LLM 模型评分从 82.6% 提升至 94.6%", "core_value": "对你的量化工作帮助：把它拆成一个量化大模型 / 智能体复现任务，先验证大模型、人工智能是否真的带来样本外提升，再检查交易成本、数据泄漏和换手约束。", "key_points_list": ["核心发现：维度化诊断可识别 LLM 输出中隐蔽的失败模式（69% 幻觉由提示引起），针对性修复带来评分显著提升（82.6%→94.6%）。", "量化可用性：需要预定义业务相关维度和指标，提供可复用的 playbook 和 agent 模板，但需投入初始维度设计工作。", "局限性：仅在一个商业案例（销售简报）上验证，通用性待检验；维度定义依赖人工经验，可能引入主观偏差；未涉及量化金融场景。"], "reference_url": "http://arxiv.org/abs/2607.05638v1", "report_sections": ["ai_quant_tools"], "report_section_labels": ["AI 量化工具"], "category_label": "量化大模型 / 智能体", "priority_label": "中", "source_type_label": "论文"}, {"id": "cdd2bd3b9375f863f8f8d4142508e57d9ba3801910bf48a5447897ea6aaebb6f", "source": "Quant StackExchange", "source_type": "forum", "title": "Replicating an SP500 index with Python", "url": "https://quant.stackexchange.com/questions/85705/replicating-an-sp500-index-with-python", "authors": ["ginjaemocoes"], "published_at": "2026-07-08", "collected_at": "2026-07-09T00:15:33Z", "raw_text": "I am looking for a reference to replicate in Python a stock market index like the SP500, or an ETF like SPY (free-floating) or RSP (equal weighting) with individual stock trades. I searched online and could not find one. I found a short blog post that replicates it in the short-term, without taking into account delistings and survivorship bias. I asked AI to program one in Python and Yahoo Finance and the returns are biased upward by around 6%. It did not take into account fees, commission, and slippage, but 6% still seems too large for a replication. Since this is a basic exercise in quantitative finance, I think such a reference is bound to exist and I am not using the right terms for it. I have access to high-quality data in CompuStat and CRSP. How can I find a reference in Python that replicates an index with stock trades? Update By \"replicate with individual trades\", I mean that I want to formulate and back-test a trading strategy that buys and sells the constituents of the index, and that the market value of such a portfolio closely follows the index, and has similar metrics: similar total return, Sharpe ratio, maximum draw-down, etc.", "abstract": "I am looking for a reference to replicate in Python a stock market index like the SP500, or an ETF like SPY (free-floating) or RSP (equal weighting) with individual stock trades. I searched online and could not find one. I found a short blog post that replicates it in the short-term, without taking into account delistings and survivorship bias. I asked AI to program one in Python and Yahoo Finance and the returns are biased upward by around 6%. It did not take into account fees, commission, and slippage, but 6% still seems too large for a replication. Since this is a basic exercise in quantitative finance, I think such a reference is bound to exist and I am not using the right terms for it. I have access to high-quality data in CompuStat and CRSP. How can I find a reference in Python that replicates an index with stock trades? Update By \"replicate with individual trades\", I mean that I want to formulate and back-test a trading strategy that buys and sells the constituents of the index, and that the market value of such a portfolio closely follows the index, and has similar metrics: similar total return, Sharpe ratio, maximum draw-down, etc.", "content_hash": "8024c9affe995a8699417c2abb71a5cbdf35d7a43575feff39850335b26e8f3a", "category": "Portfolio Construction", "tags": ["portfolio", "slippage"], "language": "en", "metadata": {"feed_url": "https://quant.stackexchange.com/feeds"}, "one_line_summary": "Python 复制标普500指数回测易高估6%回报，核心难点在退市与生存偏差处理", "technical_summary": "用户尝试用 Python 和 Yahoo Finance 数据，通过买卖指数成分股来复制 SP500/SPY 的收益与风险特征，但回测回报比实际指数高约6%。排除费用、滑点后，偏差仍过大。核心原因有三：未考虑股票退市（delisting）导致幸存者偏差；股票分割、合并等公司事件处理不当；再平衡时权重计算未严格对齐指数真实成分变化。用户有 CRSP/CompStat 高质量数据源，但缺少一个公开的 Python 参考实现，能正确处理这些细节。社区普遍认为这是量化回测的基础问题，但多数博客和 AI 代码忽略了这些陷阱，导致结果不可靠。", "key_points": ["使用 Yahoo Finance 等免费数据做指数复制回测，未处理退市与生存偏差时回报高估 6% 以上，这是社区屡次验证的结论。", "建议使用 CRSP/CompStat 数据，按指数规则逐期编制成分股列表，处理退市股票的退出价格与最后交易日，并扣除交易成本。", "市面上缺乏开箱即用的 Python 参考代码（尤其是处理退市与再平衡细节），多数方案仅短期有效，需自行完善数据管道与事件处理。"], "quant_relevance": "组合构建 / 回测偏差控制：揭示指数复制回测中常见的数据污染问题（生存偏差、退市遗漏）导致的业绩虚高，直接影响策略验证的可靠性。", "possible_use_case": "可用于任何基于个股复制的指数跟踪策略的开发与回测，例如构建 A 股沪深300复制组合时同步处理退市与成分调整。", "limitations": "帖子本身是提问，未提供实际代码或验证结果；社区共识需另行实现并测试。CRSP 数据成本高，对个人研究者不友好。", "read_priority": "高", "key_figures_md": "", "relevance_score": 6.3, "novelty_score": 9.78, "academic_score": 5.447, "discussion_score": 3.0, "actionable_score": 6.5, "final_score": 6.413, "display_title": "组合、滑点、人工智能实践讨论", "tldr": "Python 复制标普500指数回测易高估6%回报，核心难点在退市与生存偏差处理", "core_value": "对你的量化工作帮助：把它当作组合、滑点、人工智能的实盘经验线索，用来补充回测假设、交易成本假设或风控检查清单。", "key_points_list": ["使用 Yahoo Finance 等免费数据做指数复制回测，未处理退市与生存偏差时回报高估 6% 以上，这是社区屡次验证的结论。", "建议使用 CRSP/CompStat 数据，按指数规则逐期编制成分股列表，处理退市股票的退出价格与最后交易日，并扣除交易成本。", "市面上缺乏开箱即用的 Python 参考代码（尤其是处理退市与再平衡细节），多数方案仅短期有效，需自行完善数据管道与事件处理。"], "reference_url": "https://quant.stackexchange.com/questions/85705/replicating-an-sp500-index-with-python", "report_sections": ["ai_quant_tools"], "report_section_labels": ["AI 量化工具"], "category_label": "组合构建", "priority_label": "高", "source_type_label": "论坛"}, {"id": "d19e0b8c790b30fa33e086cbd070564a5d1c72e5ed25443fbe1c3fd04cb4d2b0", "source": "arXiv", "source_type": "paper", "title": "SHARC: SHAP-Based Interpretability in Machine Learning Risk Models for Regulatory Capital under ICAAP and CCAR", "url": "http://arxiv.org/abs/2607.05484v1", "authors": ["Ujjwala Vadrevu"], "published_at": "2026-07-06", "collected_at": "2026-07-09T00:08:40Z", "raw_text": "The adoption of non-parametric machine learning models for regulatory capital estimation introduces a fundamental governance challenge: the inability to explain model outputs in a manner auditable by supervisory bodies. This 'black box' problem remains a major barrier to the adoption of Gaussian Process Regression (GPR) and related ML architectures in ICAAP and CCAR workflows despite their predictive advantages over traditional parametric approaches. This paper addresses this barrier through SHARC (SHAP for Regulatory Capital), an explainability framework for the Hybrid GPR-HS architecture and its stress-testing extension. SHapley Additive exPlanations (SHAP), derived from cooperative game theory and satisfying the properties of Local Accuracy, Missingness, Consistency, and Efficiency, are applied to Stressed Value-at-Risk (SVaR) outputs under three macro scenarios: West Asia War, Climate Risk, and AI Bubble/Regulatory Burden. SHARC decomposes SVaR into baseline, mean-driven, and volatility-driven components, enabling transparent linkage between scenario design and capital outcomes. Two findings emerge. First, SHARC consistently links non-linear SVaR outputs to underlying scenario inputs, confirming framework fidelity and providing auditable traceability of capital drivers. Second, under stress conditions, the mean return component (directional loss magnitude) dominates the variance component (volatility baseline) in determining capital levels, with implications for capital limit-setting, position management, and hedging strategy. The results establish SHARC as a regulator-aligned explainability layer that makes the Hybrid GPR-HS framework fully auditable and consistent with FRTB, ICAAP Pillar 2, and CCAR transparency requirements.", "abstract": "The adoption of non-parametric machine learning models for regulatory capital estimation introduces a fundamental governance challenge: the inability to explain model outputs in a manner auditable by supervisory bodies. This 'black box' problem remains a major barrier to the adoption of Gaussian Process Regression (GPR) and related ML architectures in ICAAP and CCAR workflows despite their predictive advantages over traditional parametric approaches. This paper addresses this barrier through SHARC (SHAP for Regulatory Capital), an explainability framework for the Hybrid GPR-HS architecture and its stress-testing extension. SHapley Additive exPlanations (SHAP), derived from cooperative game theory and satisfying the properties of Local Accuracy, Missingness, Consistency, and Efficiency, are applied to Stressed Value-at-Risk (SVaR) outputs under three macro scenarios: West Asia War, Climate Risk, and AI Bubble/Regulatory Burden. SHARC decomposes SVaR into baseline, mean-driven, and volatility-driven components, enabling transparent linkage between scenario design and capital outcomes. Two findings emerge. First, SHARC consistently links non-linear SVaR outputs to underlying scenario inputs, confirming framework fidelity and providing auditable traceability of capital drivers. Second, under stress conditions, the mean return component (directional loss magnitude) dominates the variance component (volatility baseline) in determining capital levels, with implications for capital limit-setting, position management, and hedging strategy. The results establish SHARC as a regulator-aligned explainability layer that makes the Hybrid GPR-HS framework fully auditable and consistent with FRTB, ICAAP Pillar 2, and CCAR transparency requirements.", "content_hash": "13999506a7655bad0ab3280550ef301814dcc0d846b5093c3ec23706677b5add", "category": "Risk Management", "tags": ["hedging", "machine learning", "risk", "variance", "volatility"], "language": "en", "metadata": {"arxiv_categories": ["q-fin.RM", "cs.LG"]}, "one_line_summary": "SHARC 框架用 SHAP 解释混合 GPR-HS 模型的监管资本输出，实现审计级可解释性", "technical_summary": "解决高斯过程回归等非参数模型在监管资本计算中难以解释的问题。提出 SHARC 框架，利用 SHAP 将 Stressed VaR 分解为基线、均值驱动和波动驱动三个成分。在 West Asia War、Climate Risk、AI Bubble/Regulatory Burden 三个宏观压力场景下进行验证，发现均值损失幅度（方向性损失规模）主导资本水平，波动成分影响较小。框架声称与 FRTB、ICAAP Pillar 2、CCAR 透明度要求一致，但未提供具体量化指标如准确率、误差或对比实验。", "key_points": ["SHARC 用 SHAP 将 Stressed VaR 分解为均值、波动和基线成分，在三个场景下确认了可解释性。", "实现依赖 GPR-HS 模型和 SHAP 库，需要历史市场数据和场景输入，论文未提供复现代码。", "缺乏量化指标验证，仅定性描述；未与其他可解释性方法（如 LIME、PDP）对比，实用性待评估。"], "quant_relevance": "风险建模：为机器学习风险模型提供可解释性层，满足监管审计要求；研究工具：可应用于内部模型检验和压力测试归因分析。", "possible_use_case": "可嵌入量化风控框架，用于解释内部模型的 VaR 归因，满足 ICAAP/CCAR 审计要求，或作为模型诊断工具检查风险因子贡献度。", "limitations": "原文缺乏量化证据（无精度、误差、对比数字），结论基于定性描述；未提供代码或数据集，可复现性低；仅针对 GPR-HS 架构，泛化性未知；未考虑样本外稳定性。", "read_priority": "低", "key_figures_md": "", "relevance_score": 6.1, "novelty_score": 9.355, "academic_score": 10.0, "discussion_score": 2.0, "actionable_score": 4.5, "final_score": 6.401, "display_title": "机器学习、风险、方差、波动率研究论文", "tldr": "SHARC 框架用 SHAP 解释混合 GPR-HS 模型的监管资本输出，实现审计级可解释性", "core_value": "对你的量化工作帮助：把它拆成一个风险管理复现任务，先验证机器学习、风险、方差、波动率是否真的带来样本外提升，再检查交易成本、数据泄漏和换手约束。", "key_points_list": ["SHARC 用 SHAP 将 Stressed VaR 分解为均值、波动和基线成分，在三个场景下确认了可解释性。", "实现依赖 GPR-HS 模型和 SHAP 库，需要历史市场数据和场景输入，论文未提供复现代码。", "缺乏量化指标验证，仅定性描述；未与其他可解释性方法（如 LIME、PDP）对比，实用性待评估。"], "reference_url": "http://arxiv.org/abs/2607.05484v1", "report_sections": ["ai_quant_tools"], "report_section_labels": ["AI 量化工具"], "category_label": "风险管理", "priority_label": "低", "source_type_label": "论文"}, {"id": "2c91ff773193c06a9e0a33b14e9621096d36a7da63b92f7f76bdbd827eb8241f", "source": "arXiv", "source_type": "paper", "title": "Arbitrage-Free Multi-Maturity Risk-Neutral Marginals", "url": "http://arxiv.org/abs/2607.06204v1", "authors": ["Hao Qin", "Ruozhong Yang", "Charlie Che", "Liming Feng"], "published_at": "2026-07-07", "collected_at": "2026-07-09T00:08:40Z", "raw_text": "Many quantitative finance methods and applications are formulated in terms of option-implied risk-neutral marginals rather than directly in terms of option prices. Representative examples include martingale optimal transport, Bass local-volatility calibration, scenario analysis, and option-implied tail-risk measurement. The desired risk-neutral marginals should define a genuine probability law on the entire support, reproduce the input arbitrage-free option prices exactly, be free of butterfly and calendar arbitrage, and admit efficient evaluation of the density, distribution function, and quantiles, as well as Monte Carlo sampling. Existing methods typically optimize only a subset of these properties, depending on their intended purpose. This leaves a gap between upstream arbitrage-free option prices and the readily usable risk-neutral marginals required by downstream applications. We propose an explicit construction of risk-neutral marginals from discrete arbitrage-free option prices. On the observed strike range, probability mass is assigned interval by interval to exactly reproduce the input option prices. Outside the observed range, closed-form power-law tails complete the distribution by satisfying price and slope boundary conditions and allocating the remaining probability mass. Butterfly- and calendar-arbitrage-freeness are guaranteed by construction. The construction is feasible by design and computationally efficient. The resulting marginal laws admit closed-form densities, distribution functions, quantiles, and efficient Monte Carlo sampling. Numerical experiments on synthetic SSVI data and S\\&P~500 market data demonstrate that the proposed construction efficiently and robustly produces marginals satisfying all of these properties in practice.", "abstract": "Many quantitative finance methods and applications are formulated in terms of option-implied risk-neutral marginals rather than directly in terms of option prices. Representative examples include martingale optimal transport, Bass local-volatility calibration, scenario analysis, and option-implied tail-risk measurement. The desired risk-neutral marginals should define a genuine probability law on the entire support, reproduce the input arbitrage-free option prices exactly, be free of butterfly and calendar arbitrage, and admit efficient evaluation of the density, distribution function, and quantiles, as well as Monte Carlo sampling. Existing methods typically optimize only a subset of these properties, depending on their intended purpose. This leaves a gap between upstream arbitrage-free option prices and the readily usable risk-neutral marginals required by downstream applications. We propose an explicit construction of risk-neutral marginals from discrete arbitrage-free option prices. On the observed strike range, probability mass is assigned interval by interval to exactly reproduce the input option prices. Outside the observed range, closed-form power-law tails complete the distribution by satisfying price and slope boundary conditions and allocating the remaining probability mass. Butterfly- and calendar-arbitrage-freeness are guaranteed by construction. The construction is feasible by design and computationally efficient. The resulting marginal laws admit closed-form densities, distribution functions, quantiles, and efficient Monte Carlo sampling. Numerical experiments on synthetic SSVI data and S\\&P~500 market data demonstrate that the proposed construction efficiently and robustly produces marginals satisfying all of these properties in practice.", "content_hash": "24697da63332918eefa209a13107431e8d45f6f1177a303485609d846d573850", "category": "Risk Management", "tags": ["market data", "option", "risk", "volatility"], "language": "en", "metadata": {"arxiv_categories": ["q-fin.CP", "q-fin.MF"]}, "one_line_summary": "显式构造无套利多期限风险中性边际分布，精确复现期权价格并具闭合密度和高效抽样", "technical_summary": "解决现有方法无法同时满足精确复现期权价格、无套利、全支撑闭式表达和高效抽样的gap。方法在观察到的行权价区间内逐区间分配概率质量以精确匹配输入期权价格，区间外用闭合幂律尾部补全分布，并满足边界条件。核心结论：构造保证无蝶式和日历套利，给出密度、分布函数、分位数和蒙特卡洛抽样的闭式解。合成SSVI数据和S&P 500市场数据实验表明该方法高效稳健。", "key_points": ["逐区间分配概率质量加幂律尾部，保证无蝶式和日历套利，密度、分位数、抽样全闭式。", "仅需标准离散期权报价即可实现，算法简单可复现，支持大规模蒙特卡洛模拟。", "幂律尾部假设在极端波动或市场断层时可能失真，原文未实盘检验滑点影响。"], "quant_relevance": "风险建模：提供可直接用于定价、压力测试和情景分析的完整无套利边际分布；工具提效：闭合解形式减少数值计算负担。", "possible_use_case": "替代局部波动率模型校准中的边际分布构造步骤，或在风险中性密度拼接模块中集成，提升定价与风控环节的精度与速度。", "limitations": "幂律尾部假设在流动性极差或跳跃行情下可能不成立；仅用合成数据与S&P 500市场检验，其他资产类别需独立验证；未考虑交易成本与市场冲击对复现精度的影响。", "read_priority": "高", "key_figures_md": "", "relevance_score": 5.6, "novelty_score": 9.565, "academic_score": 10.0, "discussion_score": 2.0, "actionable_score": 4.5, "final_score": 6.293, "display_title": "市场数据、期权、风险、波动率研究论文", "tldr": "显式构造无套利多期限风险中性边际分布，精确复现期权价格并具闭合密度和高效抽样", "core_value": "对你的量化工作帮助：把它拆成一个风险管理复现任务，先验证市场数据、期权、风险、波动率是否真的带来样本外提升，再检查交易成本、数据泄漏和换手约束。", "key_points_list": ["逐区间分配概率质量加幂律尾部，保证无蝶式和日历套利，密度、分位数、抽样全闭式。", "仅需标准离散期权报价即可实现，算法简单可复现，支持大规模蒙特卡洛模拟。", "幂律尾部假设在极端波动或市场断层时可能失真，原文未实盘检验滑点影响。"], "reference_url": "http://arxiv.org/abs/2607.06204v1", "report_sections": ["ai_quant_tools"], "report_section_labels": ["AI 量化工具"], "category_label": "风险管理", "priority_label": "高", "source_type_label": "论文"}, {"id": "7818d52a624b6b6500fba7b50574a3b48c32f1ac6d52ba8f9a24771023bd4c1e", "source": "CoinDesk", "source_type": "crypto_news", "title": "SpaceX's first bitcoin wallet movements in six months likely don't signal sales", "url": "https://www.coindesk.com/markets/2026/07/08/spacex-s-first-bitcoin-wallet-movements-in-six-months-likely-don-t-signal-sales", "authors": [], "published_at": "2026-07-08", "collected_at": "2026-07-09T00:15:34Z", "raw_text": "Onchain trackers found the newly public company shifted a tiny amount of bitcoin between its own addresses. Nothing reached an exchange.", "abstract": "Onchain trackers found the newly public company shifted a tiny amount of bitcoin between its own addresses. Nothing reached an exchange.", " 、表征学习、订单簿预测、金融时间序列大模型等在量化里的应用。"}, {"key": "ai_quant_tools", "label": "AI 量化工具", "description": "工具主线：能提升量化研究效率的 AI 工具、代码仓库、研究自动化、智能体、回测/数据工程工具和可接入团队工作流的基础设施。"}, {"key": "daily_news", "label": "Crypto 市场每日 Top 5", "description": "加密市场新闻主线：来自 CoinDesk、CoinTelegraph、The Block、Decrypt、Blockworks 等主流媒体当日最重要的 Crypto 市场报道。"}], "category_labels": {"Alpha / Factor Research": "阿尔法 / 因子研究", "Statistical Arbitrage": "统计套利", "Portfolio Construction": "组合构建", "Risk Management": "风险管理", "Options / Volatility": "期权 / 波动率", "Market Microstructure": "市场微观结构", "Execution / Transaction Cost": "交易执行 / 交易成本", "Machine Learning for Finance": "金融机器学习", "LLM / Agents for Quant": "量化大模型 / 智能体", "Crypto Quant": "加密资产量化", "Data Engineering": "数据工程", "Backtesting / Research Tools": "回测 / 研究工具", "Industry / Career": "行业 / 职业 / 合规", "Unclassified": "未分类"}, "priority_labels": {"High": "高", "Medium": "中", "Low": "低", "高": "高", "中": "中", "低": "低"}, "source_type_labels": {"paper": "论文", "forum": "论坛", "github": "代码仓库", "blog": "博客", "news": "新闻", "social": "社交媒体", "zhihu": "知乎", "x": "X", "quantml": "QuantML", "crypto_news": "加密市场新闻"}, "report_config": {"max_items_per_category": 5, "max_total_items": 60, "executive_brief_items": 5}}</script>
  <script>
    const payload = JSON.parse(document.getElementById('dashboard-data').textContent);
    const items = payload.items || [];
    const categoryLabels = payload.category_labels || {};
    const priorityLabels = payload.priority_labels || {};
    const sourceTypeLabels = payload.source_type_labels || {};
    const state = {
      query: '',
      section: 'All',
      category: 'All',
      sort: 'score',
      activeId: items[0]?.id || null,
    };

    const priorityRank = { High: 3, Medium: 2, Low: 1, '高': 3, '中': 2, '低': 1 };
    const $ = (id) => document.getElementById(id);

    // --- Feedback ---
    const _feedbackStore = JSON.parse(localStorage.getItem('quant-feedback') || '{}');
    function getFeedback(id) { return _feedbackStore[id] || 0; }
    function setFeedback(id, signal) {
      if (_feedbackStore[id] === signal) { delete _feedbackStore[id]; signal = 0; }
      else { _feedbackStore[id] = signal; }
      localStorage.setItem('quant-feedback', JSON.stringify(_feedbackStore));
      fetch('http://localhost:8080/feedback', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, signal }),
      }).catch(() => {});
    }

    function init() {
      $('report-date').textContent = payload.report_date + ' - 主力源：arXiv / 知乎 / QuantML / 大型论坛 - 生成时间 ' + payload.generated_at;
      $('metric-items').textContent = items.length;
      $('metric-categories').textContent = new Set(items.map((item) => item.category)).size;
      $('metric-high').textContent = items.filter((item) => priorityLabel(item.read_priority) === '高').length;
      $('metric-avg').textContent = averageScore(items).toFixed(1);

      buildSectionControls();
      buildCategoryControls();
      buildSourceList();
      bindControls();
      render();
    }

    function bindControls() {
      $('search').addEventListener('input', (event) => {
        state.query = event.target.value.trim().toLowerCase();
        render();
      });
      $('category-select').addEventListener('change', (event) => {
        state.category = event.target.value;
        render();
      });
      $('section-select').addEventListener('change', (event) => {
        state.section = event.target.value;
        render();
      });
      $('sort-select').addEventListener('change', (event) => {
        state.sort = event.target.value;
        render();
      });
    }

    function buildCategoryControls() {
      const counts = countBy(items, 'category');
      const categories = Object.keys(counts).sort();
      const select = $('category-select');
      select.innerHTML = option('All', `全部细分标签 (${items.length})`) +
        categories.map((category) => option(category, `${categoryLabel(category)} (${counts[category]})`)).join('');

      const list = $('category-list');
      list.innerHTML = categoryButton('All', items.length) +
        categories.map((category) => categoryButton(category, counts[category])).join('');

      list.querySelectorAll('button').forEach((button) => {
        button.addEventListener('click', () => {
          state.category = button.dataset.category;
          select.value = state.category;
          if (state.category === 'All') {
            state.section = 'All';
            $('section-select').value = 'All';
          }
          render();
        });
      });
    }

    function buildSectionControls() {
      const counts = payload.section_counts || {};
      const sections = payload.sections || [];
      const select = $('section-select');
      select.innerHTML = option('All', `全部主线 (${items.length})`) +
        sections
          .filter((section) => counts[section.key])
          .map((section) => option(section.key, `${section.label} (${counts[section.key]})`))
          .join('');

      const list = $('section-list');
      list.innerHTML = sectionButton('All', '全部', items.length) +
        sections
          .filter((section) => counts[section.key])
          .map((section) => sectionButton(section.key, section.label, counts[section.key]))
          .join('');

      list.querySelectorAll('button').forEach((button) => {
        button.addEventListener('click', () => {
          state.section = button.dataset.section;
          select.value = state.section;
          if (state.section === 'All') {
            state.category = 'All';
            $('category-select').value = 'All';
          }
          render();
        });
      });
    }

    function buildSourceList() {
      const stats = payload.source_stats || {};
      const entries = Object.entries(stats)
        .filter(([source]) => !source.startsWith('fetched:'))
        .sort((a, b) => b[1] - a[1]);
      $('source-list').innerHTML = entries.length
        ? entries.map(([source, count]) => `<li><span>${escapeHtml(source)}</span><b>${count}</b></li>`).join('')
        : '<li><span>暂无来源统计</span><b>0</b></li>';
    }

    function render() {
      let visible = items.filter(matchesFilters);
      visible = sortItems(visible);
      if (!visible.some((item) => item.id === state.activeId)) {
        state.activeId = visible[0]?.id || null;
      }

      $('feed-title').textContent = feedTitle();
      $('result-count').textContent = `展示 ${visible.length} 条 - 两条主线每条最多 ${payload.report_config.max_items_per_category} 条`;
      renderSectionActive();
      renderCategoryActive();
      renderItems(visible);
      renderDetail(visible.find((item) => item.id === state.activeId) || visible[0]);
    }

    function matchesFilters(item) {
      const sectionMatch = state.section === 'All' || (item.report_sections || []).includes(state.section);
      if (!sectionMatch) return false;
      const categoryMatch = state.category === 'All' || item.category === state.category;
      if (!categoryMatch) return false;
      if (!state.query) return true;
      const haystack = [
        item.title,
        item.display_title,
        item.source,
        item.source_type,
        item.category,
        categoryLabel(item.category),
        sectionLabel(item.report_sections?.[0]),
        sourceTypeLabel(item.source_type),
        priorityLabel(item.read_priority),
        item.one_line_summary,
        item.technical_summary,
        item.quant_relevance,
        item.possible_use_case,
        item.tldr,
        item.core_value,
        ...(item.key_points_list || []),
        item.reference_url,
      ].join(' ').toLowerCase();
      return haystack.includes(state.query);
    }

    function sortItems(list) {
      return [...list].sort((a, b) => {
        if (state.sort === 'priority') {
          return (priorityRank[b.read_priority] || 0) - (priorityRank[a.read_priority] || 0)
            || b.final_score - a.final_score;
        }
        if (state.sort === 'source') {
          return a.source.localeCompare(b.source) || b.final_score - a.final_score;
        }
        return b.final_score - a.final_score;
      });
    }

    function renderCategoryActive() {
      document.querySelectorAll('.category-button').forEach((button) => {
        button.classList.toggle('active', button.dataset.category === state.category);
      });
    }

    function renderSectionActive() {
      document.querySelectorAll('.section-button').forEach((button) => {
        button.classList.toggle('active', button.dataset.section === state.section);
      });
    }

    function itemCard(item) {
      const sec = item.report_sections?.[0] || 'other';
      const sig = getFeedback(item.id);
      return `
        <article class="item ${item.id === state.activeId ? 'active' : ''}"
                 data-id="${escapeAttr(item.id)}"
                 data-section="${escapeAttr(sec)}">
          <div class="item-top">
            <h3>${escapeHtml(item.display_title || item.title)}</h3>
            <div class="score">${Number(item.final_score).toFixed(1)}</div>
          </div>
          <div class="meta">
            <span class="tag">${escapeHtml(categoryLabel(item.category))}</span>
            <span class="tag">${escapeHtml(item.source)}</span>
            <span class="tag">${escapeHtml(priorityLabel(item.read_priority))}</span>
          </div>
          ${readerFormat(item, true)}
          <div class="feedback-row">
            <button class="feedback-btn ${sig === 1 ? 'active-up' : ''}" data-feedback="1" title="有用">👍</button>
            <button class="feedback-btn ${sig === -1 ? 'active-down' : ''}" data-feedback="-1" title="跳过">👎</button>
            <span class="feedback-hint">${sig === 1 ? '已标记有用' : sig === -1 ? '已标记跳过' : ''}</span>
          </div>
        </article>
      `;
    }

    function sectionGroupHeader(section, count) {
      return `
        <div class="section-group-header" data-section="${escapeAttr(section.key)}">
          <span class="section-group-title">${escapeHtml(section.label)}</span>
          <span class="section-group-count">${count} 条</span>
        </div>
      `;
    }

    function renderItems(visible) {
      const container = $('items');
      if (!visible.length) {
        container.innerHTML = '<div class="empty">当前筛选条件下没有匹配内容。</div>';
        return;
      }

      let html = '';
      if (state.section === 'All') {
        // Group by section in defined order, with a header for each group
        const grouped = {};
        for (const item of visible) {
          const sec = item.report_sections?.[0] || 'other';
          if (!grouped[sec]) grouped[sec] = [];
          grouped[sec].push(item);
        }
        for (const section of (payload.sections || [])) {
          const group = grouped[section.key];
          if (!group || !group.length) continue;
          html += sectionGroupHeader(section, group.length);
          html += group.map((item) => itemCard(item)).join('');
        }
        // Append any items that fell into 'other' (shouldn't normally happen)
        if (grouped['other']?.length) {
          html += grouped['other'].map((item) => itemCard(item)).join('');
        }
      } else {
        html = visible.map((item) => itemCard(item)).join('');
      }

      container.innerHTML = html;
      container.querySelectorAll('.item').forEach((node) => {
        node.addEventListener('click', () => {
          state.activeId = node.dataset.id;
          render();
        });
      });
      container.querySelectorAll('.feedback-btn').forEach((btn) => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const itemNode = btn.closest('.item');
          setFeedback(itemNode.dataset.id, parseInt(btn.dataset.feedback, 10));
          render();
        });
      });
    }

    function renderDetail(item) {
      const detail = $('detail');
      if (!item) {
        detail.innerHTML = '<div class="empty">选择一条内容查看详情。</div>';
        return;
      }

      detail.innerHTML = `
        <h2>${escapeHtml(item.display_title || item.title)}</h2>
        <div class="meta">
          <span class="tag">${escapeHtml(categoryLabel(item.category))}</span>
          <span class="tag">${escapeHtml(sourceTypeLabel(item.source_type))}</span>
          <span class="tag">${escapeHtml(priorityLabel(item.read_priority))}</span>
        </div>

        ${readerFormat(item, false)}

        <div class="detail-block">
          <h3>评分拆解</h3>
          <div class="breakdown">
            ${bar('相关性', item.relevance_score)}
            ${bar('新颖度', item.novelty_score)}
            ${bar('学术性', item.academic_score)}
            ${bar('讨论度', item.discussion_score)}
            ${bar('可行动性', item.actionable_score)}
          </div>
        </div>

      `;
    }

    function readerFormat(item, compact) {
      const points = itemKeyPoints(item);
      return `
        <div class="reader-format ${compact ? 'compact' : ''}">
          <div class="reader-block">
            <h4>1. 这篇文章的太长不读</h4>
            <p>${escapeHtml(item.tldr || item.one_line_summary || '')}</p>
          </div>
          <div class="reader-block">
            <h4>2. 核心价值，对我量化的工作能够提供什么样的帮助</h4>
            <p>${escapeHtml(item.core_value || '')}</p>
          </div>
          <div class="reader-block">
            <h4>3. 关键核心点 / 论文或帖子摘要</h4>
            <ol>${points.map((point) => `<li>${escapeHtml(point)}</li>`).join('')}</ol>
          </div>
          <div class="reader-block">
            <h4>4. 原文链接</h4>
            ${referenceHtml(item)}
          </div>
        </div>
      `;
    }

    function itemKeyPoints(item) {
      const points = Array.isArray(item.key_points_list)
        ? item.key_points_list
        : (Array.isArray(item.key_points) ? item.key_points : []);
      const clean = points.filter(Boolean).slice(0, 3);
      return clean.length ? clean : ['需要打开原文进一步确认方法、数据和适用边界。'];
    }

    function referenceHtml(item) {
      const url = item.reference_url || '';
      if (!url) return '<p>暂无可打开链接</p>';
      return `
        <a class="reader-reference" href="${escapeAttr(url)}" target="_blank" rel="noopener noreferrer">打开原文</a>
        <small class="reference-url">${escapeHtml(url)}</small>
      `;
    }

    function bar(label, value) {
      const score = Number(value || 0);
      const width = Math.max(0, Math.min(100, score * 10));
      return `
        <div class="bar">
          <span>${label}</span>
          <div class="bar-track"><div class="bar-fill" style="width: ${width}%"></div></div>
          <b>${score.toFixed(1)}</b>
        </div>
      `;
    }

    function countBy(list, key) {
      return list.reduce((acc, item) => {
        acc[item[key]] = (acc[item[key]] || 0) + 1;
        return acc;
      }, {});
    }

    function averageScore(list) {
      if (!list.length) return 0;
      return list.reduce((sum, item) => sum + Number(item.final_score || 0), 0) / list.length;
    }

    function option(value, label) {
      return `<option value="${escapeAttr(value)}">${escapeHtml(label)}</option>`;
    }

    function sectionButton(section, label, count) {
      return `
        <button class="category-button section-button" type="button" data-section="${escapeAttr(section)}">
          <span>${escapeHtml(label)}</span>
          <span class="count">${count}</span>
        </button>
      `;
    }

    function categoryButton(category, count) {
      return `
        <button class="category-button" type="button" data-category="${escapeAttr(category)}">
          <span>${escapeHtml(category === 'All' ? '全部' : categoryLabel(category))}</span>
          <span class="count">${count}</span>
        </button>
      `;
    }

    function categoryLabel(category) {
      return categoryLabels[category] || category;
    }

    function sectionLabel(sectionKey) {
      const section = (payload.sections || []).find((item) => item.key === sectionKey);
      return section ? section.label : '其他';
    }

    function feedTitle() {
      const parts = [];
      if (state.section !== 'All') parts.push(sectionLabel(state.section));
      if (state.category !== 'All') parts.push(categoryLabel(state.category));
      return parts.length ? parts.join(' / ') : '今日情报';
    }

    function priorityLabel(priority) {
      return priorityLabels[priority] || priority;
    }

    function sourceTypeLabel(sourceType) {
      return sourceTypeLabels[sourceType] || sourceType;
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function escapeAttr(value) {
      return escapeHtml(value).replaceAll('`', '&#096;');
    }

    init();
  </script>
</body>
</html>
