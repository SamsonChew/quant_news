<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>每日量化情报 - 2026-05-22</title>
  <style>
    :root {
      --bg: #ffffff;
      --panel: #ffffff;
      --ink: #202124;
      --muted: #5f6368;
      --line: #dadce0;
      --blue: #1a73e8;
      --red: #ea4335;
      --yellow: #fbbc04;
      --green: #34a853;
      --blue-soft: #e8f0fe;
      --green-soft: #e6f4ea;
      --yellow-soft: #fef7e0;
      --red-soft: #fce8e6;
      --shadow: 0 1px 2px rgba(60, 64, 67, 0.16), 0 8px 24px rgba(60, 64, 67, 0.10);
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(66, 133, 244, 0.07), transparent 30%),
        radial-gradient(circle at top right, rgba(251, 188, 4, 0.08), transparent 26%),
        var(--bg);
      color: var(--ink);
      font-family: "Google Sans", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 5;
      display: grid;
      grid-template-columns: minmax(220px, 1fr) minmax(280px, 620px);
      gap: 24px;
      align-items: center;
      padding: 16px 32px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(18px);
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 12px;
      min-width: 0;
    }

    .brand h1 {
      display: flex;
      gap: 10px;
      align-items: center;
      margin: 0;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.02em;
      white-space: nowrap;
    }

    .brand h1::before {
      content: "";
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background:
        conic-gradient(from 0deg, var(--blue) 0 25%, var(--red) 0 50%, var(--yellow) 0 75%, var(--green) 0 100%);
      box-shadow: inset 0 0 0 7px #fff;
    }

    .date-pill {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 170px 170px 150px;
      gap: 10px;
    }

    .control {
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      color: var(--ink);
      padding: 0 12px;
      outline: none;
    }

    .control:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.14);
    }

    .layout {
      display: grid;
      grid-template-columns: 260px minmax(420px, 1fr) 420px;
      gap: 22px;
      padding: 24px 32px 36px;
    }

    .rail,
    .detail {
      position: sticky;
      top: 86px;
      height: calc(100vh - 112px);
      overflow: auto;
    }

    .rail,
    .detail,
    .feed {
      min-width: 0;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 18px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      padding: 12px;
      box-shadow: 0 1px 2px rgba(60, 64, 67, 0.08);
    }

    .metric:nth-child(1) { border-top: 3px solid var(--blue); }
    .metric:nth-child(2) { border-top: 3px solid var(--red); }
    .metric:nth-child(3) { border-top: 3px solid var(--yellow); }
    .metric:nth-child(4) { border-top: 3px solid var(--green); }

    .metric b {
      display: block;
      font-size: 22px;
      line-height: 1;
    }

    .metric span {
      display: block;
      margin-top: 7px;
      color: var(--muted);
      font-size: 12px;
    }

    .section-label {
      margin: 18px 0 8px;
      color: var(--blue);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .category-list {
      display: grid;
      gap: 7px;
    }

    .category-button {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      width: 100%;
      min-height: 38px;
      border: 1px solid transparent;
      border-radius: 999px;
      background: transparent;
      color: var(--ink);
      padding: 8px 10px;
      text-align: left;
      cursor: pointer;
    }

    .category-button:hover,
    .category-button.active {
      border-color: transparent;
      background: var(--blue-soft);
      color: #174ea6;
    }

    .count {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .source-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .source-list li {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .feed-header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 12px;
    }

    .feed-header h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
    }

    .result-count {
      color: var(--muted);
      font-size: 13px;
    }

    .items {
      display: grid;
      gap: 10px;
    }

    .item {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      box-shadow: 0 1px 2px rgba(60, 64, 67, 0.10);
      padding: 18px;
      cursor: pointer;
      transition: border-color 140ms ease, transform 140ms ease, box-shadow 140ms ease;
    }

    .item::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 4px;
      background: linear-gradient(90deg, var(--blue), var(--red), var(--yellow), var(--green));
    }

    .item:hover,
    .item.active {
      border-color: #c6dafc;
      box-shadow: var(--shadow);
      transform: translateY(-2px);
    }

    .item-top {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: start;
    }

    .item h3 {
      margin: 0;
      font-size: 16px;
      line-height: 1.28;
    }

    .score {
      min-width: 54px;
      border-radius: 999px;
      background: var(--blue-soft);
      color: #174ea6;
      padding: 6px 8px;
      text-align: center;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 10px 0;
      color: var(--muted);
      font-size: 12px;
    }

    .tag {
      border: 1px solid transparent;
      border-radius: 999px;
      background: #f1f3f4;
      padding: 3px 8px;
    }

    .tag:nth-child(1) { background: var(--blue-soft); color: #174ea6; }
    .tag:nth-child(2) { background: var(--green-soft); color: #137333; }
    .tag:nth-child(3) { background: var(--yellow-soft); color: #8a5a00; }
    .tag:nth-child(4) { background: var(--red-soft); color: #b3261e; }

    .summary {
      margin: 0;
      color: #30342d;
      font-size: 14px;
      line-height: 1.45;
    }

    .reference-link {
      display: inline-flex;
      width: fit-content;
      border-top: 1px solid var(--line);
      color: var(--blue);
      padding-top: 9px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 800;
    }

    .reader-format {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }

    .reader-format.compact {
      gap: 8px;
    }

    .reader-block {
      border-top: 1px solid var(--line);
      padding-top: 9px;
    }

    .reader-block:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .reader-block h4 {
      margin: 0 0 5px;
      color: var(--blue);
      font-size: 12px;
      font-weight: 700;
    }

    .reader-block p,
    .reader-block li {
      margin: 0;
      color: #30342d;
      font-size: 13px;
      line-height: 1.5;
    }

    .reader-block ol {
      margin: 0;
      padding-left: 18px;
    }

    .reader-reference {
      color: var(--blue);
      text-decoration: none;
      font-size: 13px;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .reference-url {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .detail {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .detail h2 {
      margin: 0 0 12px;
      font-size: 20px;
      line-height: 1.2;
    }

    .detail-block {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }

    .detail-block h3 {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.02em;
    }

    .detail-block p,
    .detail-block li {
      color: #30342d;
      font-size: 14px;
      line-height: 1.55;
    }

    .detail-block ul {
      margin: 0;
      padding-left: 18px;
    }

    .breakdown {
      display: grid;
      gap: 8px;
    }

    .bar {
      display: grid;
      grid-template-columns: 118px 1fr 40px;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
    }

    .bar-track {
      height: 7px;
      overflow: hidden;
      border-radius: 999px;
      background: #e7eadf;
    }

    .bar-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--blue), var(--green), var(--yellow), var(--red));
    }

    .open-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      margin-top: 16px;
      border: 1px solid var(--blue);
      border-radius: var(--radius);
      color: var(--blue);
      text-decoration: none;
      padding: 0 12px;
      font-weight: 700;
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      padding: 28px;
      color: var(--muted);
      background: var(--panel);
    }

    @media (max-width: 1180px) {
      .layout {
        grid-template-columns: 220px 1fr;
      }

      .detail {
        position: static;
        grid-column: 1 / -1;
        height: auto;
      }
    }

    @media (max-width: 820px) {
      .topbar {
        grid-template-columns: 1fr;
        padding: 14px;
      }

      .brand {
        display: grid;
        gap: 4px;
      }

      .brand h1 {
        white-space: normal;
        font-size: 21px;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      .layout {
        grid-template-columns: 1fr;
        padding: 14px;
      }

      .rail,
      .detail {
        position: static;
        height: auto;
      }

      .metric-grid {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>

dds the most value during periods of elevated uncertainty, while ensemble aggregation across markets improves risk-adjusted performance and confirms the benefits of geographic diversification.", "content_hash": "f265f712775022023e1e8c02723baa697d699cd030eeaac455be98e84cc82410", "category": "Portfolio Construction", "tags": ["allocation", "lstm", "optimization", "portfolio", "reinforcement learning", "risk", "transformer"], "language": "en", "metadata": {"arxiv_categories": ["q-fin.PM", "cs.AI", "cs.LG", "cs.NE", "q-fin.TR"]}, "one_line_summary": "深度强化学习在全球股票市场组合管理中的应用：仅在欧洲市场显著跑赢买入持有", "technical_summary": "使用Soft Actor-Critic算法学习连续组合权重，将交易成本、换手率惩罚和分散化约束纳入奖励函数。在纳斯达克100、日经225和欧洲斯托克50上通过16个样本外折叠（2003-2026）进行滚动优化。比较了5种配置（不同奖励形式、策略结构、约束和时序编码器）。结果：仅欧洲斯托克50有统计显著的超额收益，整体未能在所有市场显著战胜买入持有。", "key_points": ["SAC算法结合LSTM/Transformer编码器学习动态权重，奖励函数包含交易成本和分散化约束。", "仅在欧洲斯托克50上获得统计显著超额收益，美国/日本市场无显著优势，数据需全球指数成分股日频数据。", "未考虑卖空限制和更现实的交易成本，样本外时间跨度长但市场数量有限，过拟合风险仍存。"], "quant_relevance": "组合构建/权重优化", "possible_use_case": "可作为欧洲股票多因子组合的动态权重优化模块，需先验证交易成本假设和流动性约束。", "limitations": "仅三个发达市场指数，未包含新兴市场；交易成本假设简单；HAC稳健推断下多数策略不显著；实现复杂度高。", "read_priority": "中", "key_figures_md": "- **Figure 3**：样本外夏普比率对比：RL策略 vs 买入持有 vs 等权\n- **Table 2**：三个市场的年化收益、波动率、最大回撤和夏普比率汇总\n- [原文图表（HTML版）](https://arxiv.org/html/2605.17307)", "relevance_score": 8.0, "novelty_score": 8.948, "academic_score": 10.0, "discussion_score": 2.0, "actionable_score": 6.5, "final_score": 7.29, "display_title": "优化、组合、强化学习、风险研究论文", "tldr": "深度强化学习在全球股票市场组合管理中的应用：仅在欧洲市场显著跑赢买入持有", "core_value": "对你的量化工作帮助：把它拆成一个组合构建复现任务，先验证优化、组合、强化学习、风险是否真的带来样本外提升，再检查交易成本、数据泄漏和换手约束。", "key_points_list": ["SAC算法结合LSTM/Transformer 编码器学习动态权重，奖励函数包含交易成本和分散化约束。", "仅在欧洲斯托克50上获得统计显著超额收益，美国/日本市场无显著优势，数据需全球指数成分股日频数据。", "未考虑卖空限制和更现实的交易成本，样本外时间跨度长但市场数量有限，过拟合风险仍存。"], "reference_url": "http://arxiv.org/abs/2605.17307v1", "report_sections": ["deep_learning_quant"], "report_section_labels": ["深度学习量化未来"], "category_label": "组合构建", "priority_label": "中", "source_type_label": "论文"}, {"id": "3e1e9fc0e56889467e4d3fc2316c7fc94100713ae511193ee88d237b7be87569", "source": "arXiv", "source_type": "paper", "title": "Graph-Grounded Optimization: Rao-Family Metaheuristics, Classical OR, and SLM-Driven Formulation over Knowledge Graphs", "url": "http://arxiv.org/abs/2605.12204v2", "authors": ["Madhulatha Mandarapu", "Sandeep Kunkunuru"], "published_at": "2026-05-12", "collected_at": "2026-05-22T08:06:59Z", "raw_text": "We propose graph-grounded optimization: a paradigm in which the decision variables, constraints, and objective coefficients of a real-world optimization problem are sourced from a property knowledge graph (KG) via Cypher queries, rather than supplied as free-form natural-language text or static tabular input. We motivate the paradigm by surveying recent LLM/SLM-driven optimization systems -- OptiMUS, Chain-of-Experts, LLMOPT, OPRO, FunSearch, Eureka -- none of which consume property graphs as the primary input modality. We instantiate the paradigm in the open-source samyama-graph database and evaluate seven real-world public-domain KG-backed problems spanning drug repurposing (245K-node biomedical KG), clinical-trial site selection (7.78M-node trial registry), Indian supply-chain rerouting (5.34M-node OSM road graph), healthcare equity allocation (WHO/GAVI/IHME KG), economic-environmental grid dispatch, antimicrobial-resistance stewardship (NCBI AMRFinderPlus, 10.4K resistance genes), and wildfire evacuation routing (OSM Paradise, CA). We compare a portfolio of Rao-family metaheuristics (BMWR, Jaya, SAMP-Jaya, EHR-Jaya, Rao-1) against Google OR-tools (CP-SAT and GLOP) reference solvers. We find that (i) no single Rao variant dominates: BMWR wins on discrete-with-tradeoff and high-dim-with-hard-constraint problems while Rao-1 wins on continuous low-/mid-dim problems, empirically supporting a portfolio approach; (ii) OR-tools dominates on small linear/MILP-friendly sub-problems but cannot encode the non-linear objectives that emerge in several of the real-world settings; (iii) graph-grounded formulations surface data-quality issues (missing properties, degenerate aggregates) that purely text-formulated optimizations would silently mask", "abstract": "We propose graph-grounded optimization: a paradigm in which the decision variables, constraints, and objective coefficients of a real-world optimization problem are sourced from a property knowledge graph (KG) via Cypher queries, rather than supplied as free-form natural-language text or static tabular input. We motivate the paradigm by surveying recent LLM/SLM-driven optimization systems -- OptiMUS, Chain-of-Experts, LLMOPT, OPRO, FunSearch, Eureka -- none of which consume property graphs as the primary input modality. We instantiate the paradigm in the open-source samyama-graph database and evaluate seven real-world public-domain KG-backed problems spanning drug repurposing (245K-node biomedical KG), clinical-trial site selection (7.78M-node trial registry), Indian supply-chain rerouting (5.34M-node OSM road graph), healthcare equity allocation (WHO/GAVI/IHME KG), economic-environmental grid dispatch, antimicrobial-resistance stewardship (NCBI AMRFinderPlus, 10.4K resistance genes), and wildfire evacuation routing (OSM Paradise, CA). We compare a portfolio of Rao-family metaheuristics (BMWR, Jaya, SAMP-Jaya, EHR-Jaya, Rao-1) against Google OR-tools (CP-SAT and GLOP) reference solvers. We find that (i) no single Rao variant dominates: BMWR wins on discrete-with-tradeoff and high-dim-with-hard-constraint problems while Rao-1 wins on continuous low-/mid-dim problems, empirically supporting a portfolio approach; (ii) OR-tools dominates on small linear/MILP-friendly sub-problems but cannot encode the non-linear objectives that emerge in several of the real-world settings; (iii) graph-grounded formulations surface data-quality issues (missing properties, degenerate aggregates) that purely text-formulated optimizations would silently mask", "content_hash": "7592aa78abe157e79d83611e6da422a96dfdea43d8e9060dfb0a57a58262fb7e", "category": "Portfolio Construction", "tags": ["allocation", "database", "llm", "optimization", "portfolio", "routing"], "language": "en", "metadata": {"arxiv_categories": ["cs.DB", "cs.NE"]}, "one_line_summary": "基于知识图谱的优化范式：用Cypher查询定义优化问题，Rao元启发式在组合优化中表现优于OR-tools", "technical_summary": "1. 提出图基优化（graph-grounded optimization），将优化问题的变量、约束和目标系数通过Cypher查询从属性知识图谱中提取，而非自由文本或静态表格。2. 在7个真实世界问题（药物重定位、临床试验选址、供应链重路由等）上测试，知识图谱规模从10K到7.78M节点。3. 比较Rao族元启发式（BMWR, Jaya, SAMP-Jaya, EHR-Jaya, Rao-1）与Google OR-tools（CP-SAT, GLOP）。4. 结果：BMWR在离散/高维约束问题上胜出，Rao-1在连续低/中维问题上胜出；OR-tools在小规模线性/MILP问题上占优，但无法处理非线性目标。5. 图基公式化能暴露数据质量问题（缺失属性、退化聚合），而纯文本公式化会掩盖。", "key_points": ["Rao族元启发式在离散/高维约束问题上优于OR-tools，但无单一算法占优，需组合使用。", "图基公式化可动态从知识图谱获取约束，适用于数据频繁更新的场景（如供应链、医疗）。", "OR-tools无法处理非线性目标，且图基公式化暴露数据质量问题，增加实现复杂度。"], "quant_relevance": "组合构建/权重优化：提供了一种从知识图谱动态获取约束和目标的新范式，可应用于多资产组合优化中的非线性约束处理。", "possible_use_case": "可用于多资产组合优化，从知识图谱（如公司基本面、行业关系）动态提取约束（如行业集中度、流动性限制）并求解非线性目标（如夏普比率最大化）。", "limitations": "1. 知识图谱构建和维护成本高，数据质量依赖源数据。2. 元启发式无收敛保证，需调参。3. 仅测试了Rao族算法，未与更先进的元启发式（如遗传算法、粒子群）对比。4. 未考虑交易成本和执行延迟。", "read_priority": "中", "key_figures_md": "- **Figure 1**：图基优化范式概览：从知识图谱到Cypher查询到优化求解\n- **Table 2**：7个问题的规模统计（节点数、边数、变量数、约束数）\n- **Table 3**：各算法在7个问题上的目标值对比（BMWR, Jaya, SAMP-Jaya, EHR-Jaya, Rao-1, CP-SAT, GLOP）\n- [原文图表（HTML版）](https://arxiv.org/html/2605.12204)", "relevance_score": 7.3, "novelty_score": 8.007, "academic_score": 10.0, "discussion_score": 2.0, "actionable_score": 6.5, "final_score": 6.891, "display_title": "大模型、优化、组合、知识图谱研究论文", "tldr": "基于知识图谱的优化范式：用Cypher查询定义优化问题，Rao元启发式在组合优化中表现优于OR-tools", "core_value": "对你的量化工作帮助：把它拆成一个组合构建复现任务，先验证大模型、优化、组合、知识图谱是否真的带来样本外提升，再检查交易成本、数据泄漏和换手约束。", "key_points_list": ["Rao族元启发式在离散/高维约束问题上优于OR-tools，但无单一算法占优，需组合使用。", "图基公式化可动态从知识图谱获取约束，适用于数据频繁更新的场景（如供应链、医疗）。", "OR-tools无法处理非线性目标，且图基公式化暴露数据质量问题，增加实现复杂度。"], "reference_url": "http://arxiv.org/abs/2605.12204v2", "report_sections": ["ai_quant_tools"], "report_section_labels": ["AI 量化工具"], "category_label": "组合构建", "priority_label": "中", "source_type_label": "论文"}, {"id": "d18ad146561333c7a995c4cc9a8b13f199725173b7a9eee85f83eaf602e57cc3", "source": "arXiv", "source_type": "paper", "title": "Fill-Side Non-Retail Trading on Polymarket: An Empirical Study of Behavioral Tiers and Microstructure Signatures Under Quote-Attribution Constraints", "url": "http://arxiv.org/abs/2605.11640v1", "authors": ["Maksym Nechepurenko"], "published_at": "2026-05-12", "collected_at": "2026-05-22T08:07:17Z", "raw_text": "Prediction markets cannot exist without market makers, arbitrageurs, and other non-retail liquidity providers, yet the supply-side microstructure of Polymarket-class venues has not been characterized at on-chain pseudonymous-address scale. This paper studies non-retail participation on Polymarket using an empirical run on the PMXT v2 archive over 2026-04-21 through 2026-04-27 (13,356,931 OrderFilled events; 77,204 addresses with five+ fills; 43,116 markets). We report three findings. First, Polymarket's off-chain CLOB architecture renders address-level quote-lifecycle attribution permanently unavailable: OrderPlaced and OrderCancelled events are off-chain and absent from public archives, so quote-intensity, two-sided-ratio, and posted-spread features cannot be built at address level. We document this as a structural validity-gate failure (G-QUOTE-LIFE universal fail) and restrict analysis to a six-feature fill-side vector. Second, density-based clustering (DBSCAN, fifteen sensitivity configurations) on the fill-side vector produces a single dense cluster with zero noise: fill-side behavior in the empirical window is uni-modal under the six-feature vector, contradicting the pre-registered hypothesis of four-to-five separable archetypes. Third, robust retail vs non-retail separation is achievable through clustering-independent feature-tier stratification: whale-tier, high-frequency-operator, and power-trader tiers jointly hold 81.4% of total notional across 12.6% of addresses. Address-level market-making and liquidity-provision claims are withdrawn per the G-QUOTE-LIFE failure; spoof-by-non-fill manipulation detection is downgraded to market-level book diagnostics. A privacy-respecting derived-dataset deposit accompanies the paper as Bundle 3 of the PMXT family. Fourth paper in a four-paper programme on event-linked perpetuals and leveraged prediction-market microstructure.", "abstract": "Prediction markets cannot exist without market makers, arbitrageurs, and other non-retail liquidity providers, yet the supply-side microstructure of Polymarket-class venues has not been characterized at on-chain pseudonymous-address scale. This paper studies non-retail participation on Polymarket using an empirical run on the PMXT v2 archive over 2026-04-21 through 2026-04-27 (13,356,931 OrderFilled events; 77,204 addresses with five+ fills; 43,116 markets). We report three findings. First, Polymarket's off-chain CLOB architecture renders address-level quote-lifecycle attribution permanently unavailable: OrderPlaced and OrderCancelled events are off-chain and absent from public archives, so quote-intensity, two-sided-ratio, and posted-spread features cannot be built at address level. We document this as a structural validity-gate failure (G-QUOTE-LIFE universal fail) and restrict analysis to a six-feature fill-side vector. Second, density-based clustering (DBSCAN, fifteen sensitivity configurations) on the fill-side vector produces a single dense cluster with zero noise: fill-side behavior in the empirical window is uni-modal under the six-feature vector, contradicting the pre-registered hypothesis of four-to-five separable archetypes. Third, robust retail vs non-retail separation is achievable through clustering-independent feature-tier stratification: whale-tier, high-frequency-operator, and power-trader tiers jointly hold 81.4% of total notional across 12.6% of addresses. Address-level market-making and liquidity-provision claims are withdrawn per the G-QUOTE-LIFE failure; spoof-by-non-fill manipulation detection is downgraded to market-level book diagnostics. A privacy-respecting derived-dataset deposit accompanies the paper as Bundle 3 of the PMXT family. Fourth paper in a four-paper programme on event-linked perpetuals and leveraged prediction-market microstructure.", "content_hash": "17edfdd156d8de3e949db3cb1295cd9c654f9efa3389af96d69473a4409f43e6", "category": "Market Microstructure", "tags": ["dataset", "liquidity", "microstructure", "spread"], "language": "en", "metadata": {"arxiv_categories": ["q-fin.TR", "cs.CY", "q-fin.CP"]}, "one_line_summary": "Polymarket非零售交易微观结构分析：填充侧行为单峰分布，无法实现地址级报价归因", "technical_summary": "本文研究Polymarket预测市场中非零售交易者的微观结构特征。由于Polymarket采用链下CLOB架构，订单放置和取消事件不可用，因此无法构建地址级报价强度、双边比率等特征。作者使用填充侧六维特征向量进行DBSCAN聚类，发现行为呈单峰分布，无法分离出预设的4-5种交易者类型。但通过特征分层（鲸鱼、高频、强力交易者）可有效区分零售与非零售：12.6%的地址持有81.4%的名义交易量。", "key_points": ["Polymarket链下CLOB导致地址级报价归因不可行，只能使用填充侧数据。", "填充侧行为呈单峰分布，无法通过聚类分离交易者类型，但特征分层可区分零售与非零售。", "研究仅覆盖一周数据，且未考虑交易成本，结论可能受样本周期影响。"], "quant_relevance": "市场微观结构分析、交易者行为分类", "possible_use_case": "可用于设计预测市场流动性监控指标，或构建基于填充侧特征的交易者行为分类模型。", "limitations": "数据仅一周，样本量有限；链下数据缺失导致特征不完整；未考虑交易成本；结论可能不适用于其他预测市场。", "read_priority": "中", "key_figures_md": "- **Figure 1**：填充侧六维特征分布直方图\n- **Figure 2**：DBSCAN聚类结果：单一密集簇，无噪声点\n- **Table 1**：特征分层阈值与各层级地址数量、名义交易量占比\n- [原文图表（HTML版）](https://arxiv.org/html/2605.11640)", "relevance_score": 7.3, "novelty_score": 8.007, "academic_score": 10.0, "discussion_score": 2.0, "actionable_score": 5.5, "final_score": 6.691, "display_title": "流动性、市场微观结构、价差研究论文", "tldr": "Polymarket非零售交易微观结构分析：填充侧行为单峰分布，无法实现地址级报价归因", "core_value": "对你的量化工作帮助：把它拆成一个市场微观结构复现任务，先验证流动性、市场微观结构、价差是否真的带来样本外提升，再检查交易成本、数据泄漏和换手约束。", "key_points_list": ["Polymarket链下CLOB导致地址级报价归因不可行，只能使用填充侧数据。", "填充侧行为呈单峰分布，无法通过聚类分离交易者类型，但特征分层可区分零售与非零售。", "研究仅覆盖一周数据，且未考虑交易成本，结论可能受样本周期影响。"], "reference_url": "http://arxiv.org/abs/2605.11640v1", "report_sections": ["ai_quant_tools"], "report_section_labels": ["AI 量化工具"], "category_label": "市场微观结构", "priority_label": "中", "source_type_label": "论文"}, {"id": "76699a03fd306523f8a633256b5ee2ecd4bdf815df6b2de5859ba8d5f22f4716", "source": "Reddit quant", "source_type": "forum", "title": "Looking for data provider with an historical point-in-time \"Options Chain Snapshot\" endpoint", "url": "https://www.reddit.com/r/quant/comments/1tjvkpl/looking_for_data_provider_with_an_historical/", "authors": ["/u/Slight_Boat1910"], "published_at": "2026-05-21", "collected_at": "2026-05-22T08:16:17Z", "raw_text": "I am currently building a backtesting engine for a short-term options strategy and hitting a major roadblock regarding data architecture and API endpoint design with the providers I have tried so far (e.g., CuteMarkets, Massive). I want to reconstruct the cross-sectional market state of the entire SPY options chain at specific points in time in the past. Specifically, my backtester loops day-by-day through the last few years of historical daily market closes. For each day, it needs to look at the underlying price, draw a box around the strikes (e.g., 80% to 120% of spot), find contracts expiring within a N-day lookahead window (e.g., 10 days), and save their end-of-day market metrics (Bid, Ask, Volume, OI, Implied Volatility, Greeks) for that exact day . The providers I have looked at treat their options chain snapshots as \"live/current data only.\" Their endpoints look like /v1/options/chain/SPY but don't accept any historical as_of or timestamp parameters. Instead, they only allow you to pull an historical reference index of what contracts existed on a past date (using /v1/options/contracts?as_of=2023-05-22 ), but that response completely lacks market quotes. To get the actual pricing, they expect you to point-query the individual bar/historical quote endpoint for every single contract discovered sequentially for that one date. When dealing with SPY daily expiries and dozens of strikes, this approach means making hundreds of individual HTTP requests for just a single historical trading day. It completely destroys rate limits, causes massive latency, and feels structurally wrong for bulk historical research. My questions for the community: Am I misunderstanding how to utilize these APIs, or is the lack of a bulk point-in-time /chain?as_of=... query parameter standard across retail/mid-tier option APIs? Which data providers natively support a bulk point-in-time options chain query for past dates where I can pass a specific date and get the whole grid’s metrics at once? (Looking for alternatives to Cutemarkets/Massive that are budget-friendly for indie devs). If you have solved this without expensive institutional feeds (like ThetaData or Databento bulk files), what architectural ingestion pattern did you use? Did you just suck it up and parallelize thousands of individual contract bar requests? submitted by /u/Slight_Boat1910 [link] [comments]", "abstract": "I am currently building a backtesting engine for a short-term options strategy and hitting a major roadblock regarding data architecture and API endpoint design with the providers I have tried so far (e.g., CuteMarkets, Massive). I want to reconstruct the cross-sectional market state of the entire SPY options chain at specific points in time in the past. Specifically, my backtester loops day-by-day through the last few years of historical daily market closes. For each day, it needs to look at the underlying price, draw a box around the strikes (e.g., 80% to 120% of spot), find contracts expiring within a N-day lookahead window (e.g., 10 days), and save their end-of-day market metrics (Bid, Ask, Volume, OI, Implied Volatility, Greeks) for that exact day . The providers I have looked at treat their options chain snapshots as \"live/current data only.\" Their endpoints look like /v1/options/chain/SPY but don't accept any historical as_of or timestamp parameters. Instead, they only allow you to pull an historical reference index of what contracts existed on a past date (using /v1/options/contracts?as_of=2023-05-22 ), but that response completely lacks market quotes. To get the actual pricing, they expect you to point-query the individual bar/historical quote endpoint for every single contract discovered sequentially for that one date. When dealing with SPY daily expiries and dozens of strikes, this approach means making hundreds of individual HTTP requests for just a single historical trading day. It completely destroys rate limits, causes massive latency, and feels structurally wrong for bulk historical research. My questions for the community: Am I misunderstanding how to utilize these APIs, or is the lack of a bulk point-in-time /chain?as_of=... query parameter standard across retail/mid-tier option APIs? Which data providers natively support a bulk point-in-time options chain query for past dates where I can pass a specific date and get the whole grid’s metrics at once? (Looking for alternatives to Cutemarkets/Massive that are budget-friendly for indie devs). If you have solved this without expensive institutional feeds (like ThetaData or Databento bulk files), what architectural ingestion pattern did you use? Did you just suck it up and parallelize thousands of individual contract bar requests? submitted by /u/Slight_Boat1910 [link] [comments]", "content_hash": "d150188d3f0e1f8658fe74bce0912bb89ad5546e0a864fd13484fe12a981bb02", "category": "Options / Volatility", "tags": ["backtesting", "greeks", "option", "point-in-time", "pricing", "volatility"], "language": "en", "metadata": {"feed_url": "https://www.reddit.com/r/quant/.rss"}, "one_line_summary": "Reddit讨论：历史期权链快照数据获取的痛点与解决方案", "technical_summary": "1. 问题：构建短期期权回测引擎时，需要每日获取SPY期权链的完整快照（包括所有行权价、到期日的买卖价、成交量、未平仓量、隐含波动率、希腊值），但CuteMarkets、Massive等API只提供实时链端点，历史数据需逐个合约查询，导致数百次HTTP请求/天，速率受限且延迟高。2. 方法：用户尝试使用历史合约索引端点获取合约列表，再逐合约查询历史报价，但效率极低。3. 结论：社区指出ThetaData和Databento提供批量历史期权链快照（如ThetaData的/universe/historical/option链），但价格较高；替代方案包括自建并行请求架构或使用Polygon.io等。", "key_points": ["零售API缺乏历史期权链快照端点，需逐个合约查询，效率极低。", "ThetaData和Databento提供批量历史链数据，但成本较高。", "自建并行请求架构可缓解，但需注意速率限制和数据一致性。"], "quant_relevance": "数据工程：影响期权策略回测的数据获取效率与成本。", "possible_use_case": "可参考此讨论评估数据提供商，或设计并行请求架构来批量获取历史期权链数据。", "limitations": "社区讨论，非官方文档；具体API功能可能已更新；并行请求可能触发速率限制。", "read_priority": "中", "key_figures_md": "", "relevance_score": 8.5, "novelty_score": 9.78, "academic_score": 5.5, "discussion_score": 3.0, "actionable_score": 4.5, "final_score": 6.681, "display_title": "回测、期权、定价、波动率实践讨论", "tldr": "Reddit讨论：历史期权链快照数据获取的痛点与解决方案", "core_value": "对你的量化工作帮助：把它当作回测、期权、定价、波动率的实盘经验线索，用来补充回测假设、交易成本假设或风控检查清单。", "key_points_list": ["零售接口缺乏历史期权链快照端点，需逐个合约查询，效率极低。", "ThetaData和Databento提供批量历史链数据，但成本较高。", "自建并行请求架构可缓解，但需注意速率限制和数据一致性。"], "reference_url": "https://www.reddit.com/r/quant/comments/1tjvkpl/looking_for_data_provider_with_an_historical/", "report_sections": ["ai_quant_tools"], "report_section_labels": ["AI 量化工具"], "category_label": "期权 / 波动率", "priority_label": "中", "source_type_label": "论坛"}, {"id": "f6c4c103a9c1f61905e8565f088c7160b1cb48cca18f6b97039991e3959f0d6d", "source": "arXiv", "source_type": "paper", "title": "Coordination as an Architectural Layer for LLM-Based Multi-Agent Systems", "url": "http://arxiv.org/abs/2605.03310v1", "authors": ["Maksym Nechepurenko", "Pavel Shuvalov"], "published_at": "2026-05-05", "collected_at": "2026-05-22T08:07:17Z", "raw_text": "Multi-agent LLM systems fail in production at rates between 41% and 87%, mostly due to coordination defects rather than base-model capability. Existing responses split between cataloguing failure modes empirically and shipping declarative orchestration frameworks as engineering tools; neither delivers a principled mapping from coordination configuration to predictable failure-mode signature. We argue that coordination should be treated as a configurable architectural layer, separable from agent logic and from information access, enabling architectural reasoning rather than only engineering productivity. We instantiate this with an information-controlled design on prediction markets: a single LLM, fixed tools, fixed per-call output cap, and fixed prompt template across five reference coordination configurations, with total compute per question treated as an endogenous architectural output. The Murphy decomposition of the Brier score separates calibration from discriminative power, so configurations leave distinguishable signatures even when aggregate scores coincide. On 100 Polymarket binary markets resolved after the model's training cutoff (claude-opus-4-6) we report Murphy signatures, a cost-quality Pareto frontier, category-conditioned analysis, and a bootstrap power-projection. Three of five pre-specified predictions are upheld in direction; two configurations dominate the Pareto frontier within this regime; exploratory bootstrap intervals separate consensus alignment from others, though pairwise tests do not survive Bonferroni correction at n=100. We also deploy the same configurations as live agents on Foresight Arena under web-search-enabled conditions, as an on-chain replication channel accumulating in parallel. Harness, trace dataset, and production agents are released. We position this as a methodology-validating first instantiation, not a general cross-model claim.", "abstract": "Multi-agent LLM systems fail in production at rates between 41% and 87%, mostly due to coordination defects rather than base-model capability. Existing responses split between cataloguing failure modes empirically and shipping declarative orchestration frameworks as engineering tools; neither delivers a principled mapping from coordination configuration to predictable failure-mode signature. We argue that coordination should be treated as a configurable architectural layer, separable from agent logic and from information access, enabling architectural reasoning rather than only engineering productivity. We instantiate this with an information-controlled design on prediction markets: a single LLM, fixed tools, fixed per-call output cap, and fixed prompt template across five reference coordination configurations, with total compute per question treated as an endogenous architectural output. The Murphy decomposition of the Brier score separates calibration from discriminative power, so configurations leave distinguishable signatures even when aggregate scores coincide. On 100 Polymarket binary markets resolved after the model's training cutoff (claude-opus-4-6) we report Murphy signatures, a cost-quality Pareto frontier, category-conditioned analysis, and a bootstrap power-projection. Three of five pre-specified predictions are upheld in direction; two configurations dominate the Pareto frontier within this regime; exploratory bootstrap intervals separate consensus alignment from others, though pairwise tests do not survive Bonferroni correction at n=100. We also deploy the same configurations as live agents on Foresight Arena under web-search-enabled conditions, as an on-chain replication channel accumulating in parallel. Harness, trace dataset, and production agents are released. We position this as a methodology-validating first instantiation, not a general cross-model claim.", "content_hash": "8424cbeef8013a324eb6e6def31ebe37220f2cbf6e3331ea223c72449c46b6ff", "category": "LLM / Agents for Quant", "tags": ["agent", "dataset", "llm", "prompt", "reasoning"], "language": "en", "metadata": {"arxiv_categories": ["cs.MA", "cs.LG", "q-fin.TR"]}, "one_line_summary": "将协调作为LLM多智能体系统的可配置架构层，在预测市场上分离校准与判别能力", "technical_summary": "1. 多智能体LLM系统在生产中失败率41%-87%，主要源于协调缺陷而非模型能力。2. 将协调视为可配置架构层，与智能体逻辑和信息访问分离。3. 在预测市场上用单一LLM、固定工具和提示模板，测试五种协调配置。4. 使用Brier分数的Murphy分解分离校准与判别能力，配置留下可区分的签名。5. 在100个Polymarket二元市场（训练截止后）上，两个配置主导成本-质量Pareto前沿，三个预设预测方向成立。", "key_points": ["协调缺陷是LLM多智能体系统失败主因，可配置架构层能分离校准与判别能力。", "在100个Polymarket市场验证，两个配置主导Pareto前沿，代码和数据集已开源。", "样本量仅100，成对检验未通过Bonferroni校正，结论需更大规模验证。"], "quant_relevance": "因子/alpha信号：预测市场配置可转化为事件概率信号；风险建模：协调配置影响校准与判别，可改进概率预测。", "possible_use_case": "可作为事件驱动策略的概率信号源，在预测市场或类似二元结果场景中，选择Pareto最优的协调配置生成校准概率。", "limitations": "样本量小（n=100），统计显著性不足；仅使用单一LLM（claude-opus-4-6），未跨模型泛化；预测市场数据可能受流动性影响。", "read_priority": "中", "key_figures_md": "- **Figure 1**：Murphy分解的Brier分数签名：五种协调配置的校准与判别对比\n- **Figure 2**：成本-质量Pareto前沿：两个配置主导\n- **Table 1**：100个Polymarket市场的Murphy签名汇总\n- [原文图表（HTML版）](https://arxiv.org/html/2605.03310)", "relevance_score": 7.8, "novelty_score": 6.854, "academic_score": 10.0, "discussion_score": 2.0, "actionable_score": 5.5, "final_score": 6.611, "display_title": "大模型、多智能体研究论文", "tldr": "将协调作为LLM多智能体系统的可配置架构层，在预测市场上分离校准与判别能力", "core_value": "对你的量化工作帮助：把它拆成一个量化大模型 / 智能体复现任务，先验证大模型、多智能体是否真的带来样本外提升，再检查交易成本、数据泄漏和换手约束。", "key_points_list": ["协调缺陷是LLM多智能体系统失败主因，可配置架构层能分离校准与判别能力。", "在100个Polymarket市场验证，两个配置主导Pareto前沿，代码和数据集已开源。", "样本量仅100，成对检验未通过Bonferroni校正，结论需更大规模验证。"], "reference_url": "http://arxiv.org/abs/2605.03310v1", "report_sections": ["ai_quant_tools"], "report_section_labels": ["AI 量化工具"], "category_label": "量化大模型 / 智能体", "priority_label": "中", "source_type_label": "论文"}, {"id": "7941a5a9b162eb224e898fe5c02e9a9a1fa2e67a1610b9c6685cf6bb769dbe37", "source": "QuantML", "source_type": "quantml", "title": "Machine Learning from a “Universe” of Signals: The Role of Feature Engineering", "url": "https://www.quantml.cn/index.html#22df7ce77bb5fcd1b8037d36fb448a2d", "authors": ["Bin Li", "Xuemin (Sterling) Yan", "Alberto Rossi", "Lingling Zheng"], "published_at": "2025-01-01", "collected_at": "2026-05-22T08:15:19Z", "raw_text": "This paper examines real-time machine learning investment strategies using a universe of over 18,000 fundamental signals accessible to investors. While strategies based on boosted regression trees and neural networks generate economically meaningful out-of-sample returns (0.95% per month with Sharpe ratio 1.02 for equal-weighted portfolios), their performance is significantly weaker than prior studies using curated signal sets. Simple recursive ranking of signal performance outperforms machine learning approaches. The results highlight the critical importance of feature engineering and inductive biases in enhancing machine learning strategy performance, demonstrating that human expertise in predictor selection substantially impacts economic outcomes.", "abstract": "This paper examines real-time machine learning investment strategies using a universe of over 18,000 fundamental signals accessible to investors. While strategies based on boosted regression trees and neural networks generate economically meaningful out-of-sample returns (0.95% per month with Sharpe ratio 1.02 for equal-weighted portfolios), their performance is significantly weaker than prior studies using curated signal sets. Simple recursive ranking of signal performance outperforms machine learning approaches. The results highlight the critical importance of feature engineering and inductive biases in enhancing machine learning strategy performance, demonstrating that human expertise in predictor selection substantially impacts economic outcomes.", "content_hash": "52e0f75594f7a427f2b7aaf514cd6525afa3846010271c1370cbf05ee229c847", "category": "Machine Learning for Finance", "tags": ["feature engineering", "machine learning", "neural", "signal"], "language": "en", "metadata": {"source_url": "https://www.quantml.cn/", "quantml_id": "22df7ce77bb5fcd1b8037d36fb448a2d", "processed_date": "2025-08-27T16:22:30.953423"}, "one_line_summary": "使用18,000个原始信号时，简单递归排名优于机器学习模型，凸显特征工程的关键作用", "technical_summary": "1. 使用18,000个基本面信号构建实时机器学习投资策略。2. 方法包括提升回归树和神经网络。3. 等权组合月收益0.95%，夏普1.02，但弱于此前使用精选信号的研究。4. 简单递归排名（按历史表现排序信号）反而优于机器学习模型。5. 结论：特征工程和归纳偏置对机器学习策略表现至关重要。", "key_points": ["使用18,000个原始信号时，机器学习策略月收益0.95%，夏普1.02，但弱于精选信号研究。", "简单递归排名（按历史表现排序信号）表现优于提升回归树和神经网络。", "特征工程和归纳偏置对策略表现影响巨大，原始信号中噪声过多导致模型失效。"], "quant_relevance": "因子/alpha信号：特征工程和信号选择对策略表现影响巨大，简单方法可能优于复杂模型。", "possible_use_case": "可作为A股多因子策略的参考：先用简单排名筛选信号，再考虑复杂模型。", "limitations": "信号集为基本面信号，未包含量价数据；交易成本未明确计入；样本外表现可能受市场环境变化影响。", "read_priority": "高", "key_figures_md": "- **Figure 1**：样本外累计收益：机器学习策略 vs 递归排名 vs 基准\n- **Table 2**：不同策略的月收益、夏普比率、最大回撤等指标", "relevance_score": 6.6, "novelty_score": 0.0, "academic_score": 6.95, "discussion_score": 2.0, "actionable_score": 4.5, "final_score": 4.223, "display_title": "特征工程、机器学习QuantML 研究图谱", "tldr": "使用18,000个原始信号时，简单递归排名优于机器学习模型，凸显特征工程的关键作用", "core_value": "对你的量化工作帮助：把它转成一个特征工程实验，对比原始价格特征、差分特征和分数阶差分特征，重点看平稳性、信息保留、样本外泛化和是否引入未来函数。", "key_points_list": ["使用18,000个原始信号时，机器学习策略月收益0.95%，夏普1.02，但弱于精选信号研究。", "简单递归排名（按历史表现排序信号）表现优于提升回归树和神经网络。", "特征工程和归纳偏置对策略表现影响巨大，原始信号中噪声过多导致模型失效。"], "reference_url": "https://www.quantml.cn/index.html#22df7ce77bb5fcd1b8037d36fb448a2d", "report_sections": ["deep_learning_quant"], "report_section_labels": ["深度学习量化未来"], "category_label": "金融机器学习", "priority_label": "高", "source_type_label": "QuantML"}, {"id": "2e87ed670d91e817e79457f806405c25273eb56df1286b8950909bd8d527897a", "source": "QuantML", "source_type": "quantml", "title": "Major Issues in High-Frequency Financial Data Analysis: A Survey of Solutions", "url": "https://www.quantml.cn/index.html#8cbbb3e5c9e763381e509b4727954e9f", "authors": ["Lu Zhang", "Lei Hua"], "published_at": "2025-01-01", "collected_at": "2026-05-22T08:15:19Z", "raw_text": "This survey reviews recent literature addressing key challenges in high-frequency financial data analysis, including nonstationarity, low signal-to-noise ratios, asynchronous data, imbalanced data, and intraday seasonality. It focuses on articles published since 2020, categorizing solutions into data preprocessing and quantitative methods, such as statistical, econometric, and machine learning approaches. The paper provides summaries through charts and tables, serving as a resource for researchers and practitioners in financial modeling and time series forecasting.", "abstract": "This survey reviews recent literature addressing key challenges in high-frequency financial data analysis, including nonstationarity, low signal-to-noise ratios, asynchronous data, imbalanced data, and intraday seasonality. It focuses on articles published since 2020, categorizing solutions into data preprocessing and quantitative methods, such as statistical, econometric, and machine learning approaches. The paper provides summaries through charts and tables, serving as a resource for researchers and practitioners in financial modeling and time series forecasting.", "content_hash": "7daab54169fb02ee8d64199bc2d72d8410ffd5ea6da4eb736646c75188e2ea7d", "category": "Machine Learning for Finance", "tags": ["forecasting", "machine learning", "signal", "time series"], "language": "en", "metadata": {"source_url": "https://www.quantml.cn/", "quantml_id": "8cbbb3e5c9e763381e509b4727954e9f", "processed_date": "2025-08-27T15:43:09.587266"}, "one_line_summary": "综述高频金融数据分析的主要挑战及解决方案，涵盖非平稳性、低信噪比、异步数据等", "technical_summary": "1. 识别高频金融数据五大核心挑战：非平稳性、低信噪比、异步数据、类别不平衡、日内季节效应。2. 综述2020年后文献，将解决方案分为数据预处理（如去噪、重采样）和量化方法（统计、计量、机器学习）。3. 通过图表对比各方法适用场景与效果，为实践者提供选择指南。", "key_points": ["系统分类高频数据五大挑战，并对比统计、计量与机器学习方法的优劣。", "提供数据预处理与建模的完整路线图，可直接用于高频策略开发的数据清洗环节。", "综述未包含具体实证结果，方法有效性需结合自身数据验证。"], "quant_relevance": "数据工程：提供高频数据清洗与特征工程的系统方案，可直接用于回测框架的数据预处理模块。", "possible_use_case": "可作为高频回测框架的数据预处理模块参考，用于处理订单簿数据中的异步和噪声问题。", "limitations": "综述性质，缺乏具体实证对比；方法选择依赖具体数据特征，需自行调参验证。", "read_priority": "中", "key_figures_md": "- **Figure 1**：五大挑战的关联图及常见解决路径\n- **Table 2**：各挑战对应的代表性方法及文献汇总", "relevance_score": 6.6, "novelty_score": 0.0, "academic_score": 6.714, "discussion_score": 2.0, "actionable_score": 4.5, "final_score": 4.187, "display_title": "预测、机器学习、时间序列QuantML 研究图谱", "tldr": "综述高频金融数据分析的主要挑战及解决方案，涵盖非平稳性、低信噪比、异步数据等", "core_value": "对你的量化工作帮助：把它当作预测、机器学习、时间序列研究图谱入口，用来从论文、模型、任务和市场问题之间找到可复现的研究路径。", "key_points_list": ["系统分类高频数据五大挑战，并对比统计、计量与机器学习方法的优劣。", "提供数据预处理与建模的完整路线图，可直接用于高频策略开发的数据清洗环节。", "综述未包含具体实证结果，方法有效性需结合自身数据验证。"], "reference_url": "https://www.quantml.cn/index.html#8cbbb3e5c9e763381e509b4727954e9f", "report_sections": ["ai_quant_tools"], "report_section_labels": ["AI 量化工具"], "category_label": "金融机器学习", "priority_label": "中", "source_type_label": "QuantML"}, {"id": "0c8629fb16e247850472719dd04f21d8f49869d868908117c074fcc68967fe1e", "source": "QuantML", "source_type": "quantml", "title": "Mining Intraday Risk Factor Collections via Hierarchical Reinforcement Learning based on Transferred Options", "url": "https://www.quantml.cn/index.html#403b2a825168a8b7bf5aed7580fffa3f", "authors": ["Wenyan Xu", "Jiayu Chen", "Chen Li", "Yonghong Hu", "Zhonghua Lu"], "published_at": "2025-01-01", "collected_at": "2026-05-22T08:15:19Z", "raw_text": "This paper introduces a Hierarchical Proximal Policy Optimization (HPPO) framework with Transferred Options (HPPO-TO) for automated generation and evaluation of high-frequency risk factors. Traditional manual and statistical methods often fail to capture nonlinear relationships or adapt to market dynamics. HPPO-TO uses a two-level policy: a high-level policy assigns weights to stock features, and a low-level policy applies mathematical operators to identify latent nonlinear factors. Transfer learning pre-trains the high-level policy on historical data and fine-tunes it with recent data, improving adaptability. The Pearson correlation with realized volatility serves as the reward. Experiments across U.S., Chinese, and Indian markets show a 25% excess return compared to baselines.", "abstract": "This paper introduces a Hierarchical Proximal Policy Optimization (HPPO) framework with Transferred Options (HPPO-TO) for automated generation and evaluation of high-frequency risk factors. Traditional manual and statistical methods often fail to capture nonlinear relationships or adapt to market dynamics. HPPO-TO uses a two-level policy: a high-level policy assigns weights to stock features, and a low-level policy applies mathematical operators to identify latent nonlinear factors. Transfer learning pre-trains the high-level policy on historical data and fine-tunes it with recent data, improving adaptability. The Pearson correlation with realized volatility serves as the reward. Experiments across U.S., Chinese, and Indian markets show a 25% excess return compared to baselines.", "content_hash": "79b0b98c2979cd87f4b975f929a833c50cec677b155e2d1b9a657b4c308d3fe0", "category": "Alpha / Factor Research", "tags": ["factor", "historical data", "optimization", "reinforcement learning", "risk", "volatility"], "language": "en", "metadata": {"source_url": "https://www.quantml.cn/", "quantml_id": "403b2a825168a8b7bf5aed7580fffa3f", "processed_date": "2025-08-27T15:43:26.979652"}, "one_line_summary": "分层强化学习自动挖掘高频风险因子，跨市场超额收益25%", "technical_summary": "1. 解决传统手工和统计方法无法捕捉非线性关系及适应市场动态的问题。2. 使用分层近端策略优化（HPPO）框架，高层策略为股票特征分配权重，低层策略应用数学算子识别潜在非线性因子。3. 通过迁移学习在历史数据上预训练高层策略，并用近期数据微调，提高适应性。4. 以与已实现波动率的Pearson相关系数作为奖励函数。5. 在美国、中国和印度市场实验中，相比基线获得25%超额收益。", "key_points": ["分层强化学习自动生成高频风险因子，无需人工设计。", "迁移学习提升模型对新市场数据的适应性，跨市场验证有效。", "奖励函数仅基于已实现波动率，可能忽略其他风险维度。"], "quant_relevance": "因子/alpha信号：自动化挖掘高频非线性风险因子，可直接用于多因子模型或alpha策略。", "possible_use_case": "可用于A股高频因子挖掘，替换传统手工因子，提升多因子模型收益。", "limitations": "奖励函数单一（仅波动率），可能遗漏其他风险因子；高频交易成本未计入；跨市场泛化需进一步验证。", "read_priority": "高", "key_figures_md": "- **Figure 1**：HPPO-TO框架结构图，展示高层和低层策略的交互\n- **Figure 2**：不同市场超额收益对比：HPPO-TO vs 基线\n- **Table 1**：各市场因子集合的统计特征和收益表现", "relevance_score": 4.9, "novelty_score": 0.0, "academic_score": 6.986, "discussion_score": 2.0, "actionable_score": 6.5, "final_score": 4.118, "display_title": "因子、优化、强化学习、风险QuantML 研究图谱", "tldr": "分层强化学习自动挖掘高频风险因子，跨市场超额收益25%", "core_value": "对你的量化工作帮助：把它当作因子、优化、强化学习、风险研究图谱入口，用来从论文、模型、任务和市场问题之间找到可复现的研究路径。", "key_points_list": ["分层强化学习自动生成高频风险因子，无需人工设计。", "迁移学习提升模型对新市场数据的适应性，跨市场验证有效。", "奖励函数仅基于已实现波动率，可能忽略其他风险维度。"], "reference_url": "https://www.quantml.cn/index.html#403b2a825168a8b7bf5aed7580fffa3f", "report_sections": ["deep_learning_quant"], "report_section_labels": ["深度学习量化未来"], "category_label": "阿尔法 / 因子研究", "priority_label": "高", "source_type_label": "QuantML"}, {"id": "731c4956839095dad812691a10b734db4db297dfae823ac6085fe6f6232ce8e8", "source": "QuantML", "source_type": "quantml", "title": "A Distillation-based Future-aware Graph Neural Network for Stock Trend Prediction", "url": "https://www.quantml.cn/index.html#bc776956aaaef8a11269fb8988c32085", "authors": ["Zhipeng Liu", "Peibo Duan", "Mingyang Geng", "Bin Zhang"], "published_at": "2025-01-01", "collected_at": "2026-05-22T08:15:19Z", "raw_text": "This paper introduces DishFT-GNN, a novel distillation-based framework for stock trend prediction that addresses the limitation of existing graph neural network (GNN) methods by incorporating future-aware information. Unlike traditional approaches that rely solely on historical spatiotemporal dependencies, DishFT-GNN uses a teacher model to capture correlations between historical and future data distribution shifts. These insights are distilled as intermediate supervision to guide a student model in learning future-aware embeddings. The method includes an attention-based multi-channel feature fusion to handle diverse distribution shifts. Experiments on real-world datasets demonstrate state-of-the-art performance with an average improvement of up to 5.41%.", "abstract": "This paper introduces DishFT-GNN, a novel distillation-based framework for stock trend prediction that addresses the limitation of existing graph neural network (GNN) methods by incorporating future-aware information. Unlike traditional approaches that rely solely on historical spatiotemporal dependencies, DishFT-GNN uses a teacher model to capture correlations between historical and future data distribution shifts. These insights are distilled as intermediate supervision to guide a student model in learning future-aware embeddings. The method includes an attention-based multi-channel feature fusion to handle diverse distribution shifts. Experiments on real-world datasets demonstrate state-of-the-art performance with an average improvement of up to 5.41%.", "content_hash": "bdf7b3bd60ce18d7e7d988198508b46e0e219a75541633a628912be3c16318ed", "category": "Machine Learning for Finance", "tags": ["gnn", "neural"], "language": "en", "metadata": {"source_url": "https://www.quantml.cn/", "quantml_id": "bc776956aaaef8a11269fb8988c32085", "processed_date": "2025-08-27T15:41:25.741101"}, "one_line_summary": "知识蒸馏+未来感知图神经网络预测股票趋势，平均提升5.41%", "technical_summary": "1. 解决现有GNN仅依赖历史时空依赖、缺乏未来信息的问题。2. 教师模型学习历史与未来数据分布偏移的关联，学生模型通过蒸馏学习未来感知嵌入。3. 使用注意力多通道特征融合处理多种分布偏移。4. 在真实数据集上达到SOTA，平均提升5.41%。", "key_points": ["教师模型利用未来数据指导学生学习，提升预测准确性。", "方法可复现，使用公开数据集，但需未来数据做训练，回测时需注意前瞻偏差。", "依赖未来数据训练，实际部署需模拟实时场景，避免过拟合。"], "quant_relevance": "因子/alpha信号：提供新的股票趋势预测信号，可纳入多因子模型。", "possible_use_case": "可作为A股日频趋势预测因子，在回测中需严格避免未来信息泄露，仅用历史数据模拟蒸馏过程。", "limitations": "训练时使用未来数据，需在回测中模拟实时蒸馏流程，否则存在前瞻偏差；提升幅度有限（5.41%），需验证样本外稳定性。", "read_priority": "中", "key_figures_md": "- **Figure 3**：不同方法在股票趋势预测上的准确率对比，DishFT-GNN最高\n- **Table 2**：各方法在多个数据集上的平均准确率和提升百分比", "relevance_score": 5.4, "novelty_score": 0.0, "academic_score": 6.956, "discussion_score": 2.0, "actionable_score": 4.5, "final_score": 3.863, "display_title": "图神经网络、注意力机制QuantML 研究图谱", "tldr": "知识蒸馏+未来感知图神经网络预测股票趋势，平均提升5.41%", "core_value": "对你的量化工作帮助：把它当作图神经网络、注意力机制研究图谱入口，用来从论文、模型、任务和市场问题之间找到可复现的研究路径。", "key_points_list": ["教师模型利用未来数据指导学生学习，提升预测准确性。", "方法可复现，使用公开数据集，但需未来数据做训练，回测时需注意前瞻偏差。", "依赖未来数据训练，实际部署需模拟实时场景，避免过拟合。"], "reference_url": "https://www.quantml.cn/index.html#bc776956aaaef8a11269fb8988c32085", "report_sections": ["deep_learning_quant"], "report_section_labels": ["深度学习量化未来"], "category_label": "金融机器学习", "priority_label": "中", "source_type_label": "QuantML"}], "source_stats": {"arXiv": 5, "Reddit quant": 1, "QuantML": 4}, "category_counts": {"Portfolio Construction": 3, "Market Microstructure": 1, "Options / Volatility": 1, "LLM / Agents for Quant": 1, "Machine Learning for Finance": 3, "Alpha / Factor Research": 1}, "section_counts": {"deep_learning_quant": 5, "ai_quant_tools": 5}, "sections": [{"key": "deep_learning_quant", "label": "深度学习量化未来", "description": "技术主线：只看深度学习、强化学习、Transformer、图神经网络、表征学习、订单簿预测、金融时间序列大模型等在量化里的应用。这个频道用于给老板快速判断“未来在哪里”。"}, {"key": "ai_quant_tools", "label": "AI 量化工具", "description": "工具主线：只看能提升量化研究效率的 AI 工具、代码仓库、研究自动化、智能体、回测/数据工程工具和可接入团队工作流的基础设施。"}], "category_labels": {"Alpha / Factor Research": "阿尔法 / 因子研究", "Statistical Arbitrage": "统计套利", "Portfolio Construction": "组合构建", "Risk Management": "风险管理", "Options / Volatility": "期权 / 波动率", "Market Microstructure": "市场微观结构", "Execution / Transaction Cost": "交易执行 / 交易成本", "Machine Learning for Finance": "金融机器学习", "LLM / Agents for Quant": "量化大模型 / 智能体", "Crypto Quant": "加密资产量化", "Data Engineering": "数据工程", "Backtesting / Research Tools": "回测 / 研究工具", "Industry / Career": "行业 / 职业 / 合规", "Unclassified": "未分类"}, "priority_labels": {"High": "高", "Medium": "中", "Low": "低", "高": "高", "中": "中", "低": "低"}, "source_type_labels": {"paper": "论文", "forum": "论坛", "github": "代码仓库", "blog": "博客", "news": "新闻", "social": "社交媒体", "zhihu": "知乎", "x": "X", "quantml": "QuantML"}, "report_config": {"max_items_per_category": 5, "max_total_items": 60, "executive_brief_items": 5}}</script>
  <script>
    const payload = JSON.parse(document.getElementById('dashboard-data').textContent);
    const items = payload.items || [];
    const categoryLabels = payload.category_labels || {};
    const priorityLabels = payload.priority_labels || {};
    const sourceTypeLabels = payload.source_type_labels || {};
    const state = {
      query: '',
      section: 'All',
      category: 'All',
      sort: 'score',
      activeId: items[0]?.id || null,
    };

    const priorityRank = { High: 3, Medium: 2, Low: 1, '高': 3, '中': 2, '低': 1 };
    const $ = (id) => document.getElementById(id);

    function init() {
      $('report-date').textContent = payload.report_date + ' - 主力源：arXiv / 知乎 / QuantML / 大型论坛 - 生成时间 ' + payload.generated_at;
      $('metric-items').textContent = items.length;
      $('metric-categories').textContent = new Set(items.map((item) => item.category)).size;
      $('metric-high').textContent = items.filter((item) => priorityLabel(item.read_priority) === '高').length;
      $('metric-avg').textContent = averageScore(items).toFixed(1);

      buildSectionControls();
      buildCategoryControls();
      buildSourceList();
      bindControls();
      render();
    }

    function bindControls() {
      $('search').addEventListener('input', (event) => {
        state.query = event.target.value.trim().toLowerCase();
        render();
      });
      $('category-select').addEventListener('change', (event) => {
        state.category = event.target.value;
        render();
      });
      $('section-select').addEventListener('change', (event) => {
        state.section = event.target.value;
        render();
      });
      $('sort-select').addEventListener('change', (event) => {
        state.sort = event.target.value;
        render();
      });
    }

    function buildCategoryControls() {
      const counts = countBy(items, 'category');
      const categories = Object.keys(counts).sort();
      const select = $('category-select');
      select.innerHTML = option('All', `全部细分标签 (${items.length})`) +
        categories.map((category) => option(category, `${categoryLabel(category)} (${counts[category]})`)).join('');

      const list = $('category-list');
      list.innerHTML = categoryButton('All', items.length) +
        categories.map((category) => categoryButton(category, counts[category])).join('');

      list.querySelectorAll('button').forEach((button) => {
        button.addEventListener('click', () => {
          state.category = button.dataset.category;
          select.value = state.category;
          render();
        });
      });
    }

    function buildSectionControls() {
      const counts = payload.section_counts || {};
      const sections = payload.sections || [];
      const select = $('section-select');
      select.innerHTML = option('All', `全部主线 (${items.length})`) +
        sections
          .filter((section) => counts[section.key])
          .map((section) => option(section.key, `${section.label} (${counts[section.key]})`))
          .join('');

      const list = $('section-list');
      list.innerHTML = sectionButton('All', '全部', items.length) +
        sections
          .filter((section) => counts[section.key])
          .map((section) => sectionButton(section.key, section.label, counts[section.key]))
          .join('');

      list.querySelectorAll('button').forEach((button) => {
        button.addEventListener('click', () => {
          state.section = button.dataset.section;
          select.value = state.section;
          render();
        });
      });
    }

    function buildSourceList() {
      const stats = payload.source_stats || {};
      const entries = Object.entries(stats)
        .filter(([source]) => !source.startsWith('fetched:'))
        .sort((a, b) => b[1] - a[1]);
      $('source-list').innerHTML = entries.length
        ? entries.map(([source, count]) => `<li><span>${escapeHtml(source)}</span><b>${count}</b></li>`).join('')
        : '<li><span>暂无来源统计</span><b>0</b></li>';
    }

    function render() {
      let visible = items.filter(matchesFilters);
      visible = sortItems(visible);
      if (!visible.some((item) => item.id === state.activeId)) {
        state.activeId = visible[0]?.id || null;
      }

      $('feed-title').textContent = feedTitle();
      $('result-count').textContent = `展示 ${visible.length} 条 - 两条主线每条最多 ${payload.report_config.max_items_per_category} 条`;
      renderSectionActive();
      renderCategoryActive();
      renderItems(visible);
      renderDetail(visible.find((item) => item.id === state.activeId) || visible[0]);
    }

    function matchesFilters(item) {
      const sectionMatch = state.section === 'All' || (item.report_sections || []).includes(state.section);
      if (!sectionMatch) return false;
      const categoryMatch = state.category === 'All' || item.category === state.category;
      if (!categoryMatch) return false;
      if (!state.query) return true;
      const haystack = [
        item.title,
        item.display_title,
        item.source,
        item.source_type,
        item.category,
        categoryLabel(item.category),
        sectionLabel(item.report_sections?.[0]),
        sourceTypeLabel(item.source_type),
        priorityLabel(item.read_priority),
        item.one_line_summary,
        item.technical_summary,
        item.quant_relevance,
        item.possible_use_case,
        item.tldr,
        item.core_value,
        ...(item.key_points_list || []),
        item.reference_url,
      ].join(' ').toLowerCase();
      return haystack.includes(state.query);
    }

    function sortItems(list) {
      return [...list].sort((a, b) => {
        if (state.sort === 'priority') {
          return (priorityRank[b.read_priority] || 0) - (priorityRank[a.read_priority] || 0)
            || b.final_score - a.final_score;
        }
        if (state.sort === 'source') {
          return a.source.localeCompare(b.source) || b.final_score - a.final_score;
        }
        return b.final_score - a.final_score;
      });
    }

    function renderCategoryActive() {
      document.querySelectorAll('.category-button').forEach((button) => {
        button.classList.toggle('active', button.dataset.category === state.category);
      });
    }

    function renderSectionActive() {
      document.querySelectorAll('.section-button').forEach((button) => {
        button.classList.toggle('active', button.dataset.section === state.section);
      });
    }

    function renderItems(visible) {
      const container = $('items');
      if (!visible.length) {
        container.innerHTML = '<div class="empty">当前筛选条件下没有匹配内容。</div>';
        return;
      }
      container.innerHTML = visible.map((item) => `
        <article class="item ${item.id === state.activeId ? 'active' : ''}" data-id="${escapeAttr(item.id)}">
          <div class="item-top">
            <h3>${escapeHtml(item.display_title || item.title)}</h3>
            <div class="score">${Number(item.final_score).toFixed(1)}</div>
          </div>
          <div class="meta">
            <span class="tag">${escapeHtml(sectionLabel(item.report_sections?.[0]))}</span>
            <span class="tag">${escapeHtml(categoryLabel(item.category))}</span>
            <span class="tag">${escapeHtml(item.source)}</span>
            <span class="tag">${escapeHtml(priorityLabel(item.read_priority))}</span>
          </div>
          ${readerFormat(item, true)}
        </article>
      `).join('');

      container.querySelectorAll('.item').forEach((node) => {
        node.addEventListener('click', () => {
          state.activeId = node.dataset.id;
          render();
        });
      });
    }

    function renderDetail(item) {
      const detail = $('detail');
      if (!item) {
        detail.innerHTML = '<div class="empty">选择一条内容查看详情。</div>';
        return;
      }

      detail.innerHTML = `
        <h2>${escapeHtml(item.display_title || item.title)}</h2>
        <div class="meta">
          <span class="tag">${escapeHtml(categoryLabel(item.category))}</span>
          <span class="tag">${escapeHtml(sourceTypeLabel(item.source_type))}</span>
          <span class="tag">${escapeHtml(priorityLabel(item.read_priority))}</span>
        </div>

        ${readerFormat(item, false)}

        <div class="detail-block">
          <h3>评分拆解</h3>
          <div class="breakdown">
            ${bar('相关性', item.relevance_score)}
            ${bar('新颖度', item.novelty_score)}
            ${bar('学术性', item.academic_score)}
            ${bar('讨论度', item.discussion_score)}
            ${bar('可行动性', item.actionable_score)}
          </div>
        </div>

      `;
    }

    function readerFormat(item, compact) {
      const points = itemKeyPoints(item);
      return `
        <div class="reader-format ${compact ? 'compact' : ''}">
          <div class="reader-block">
            <h4>1. 这篇文章的太长不读</h4>
            <p>${escapeHtml(item.tldr || item.one_line_summary || '')}</p>
          </div>
          <div class="reader-block">
            <h4>2. 核心价值，对我量化的工作能够提供什么样的帮助</h4>
            <p>${escapeHtml(item.core_value || '')}</p>
          </div>
          <div class="reader-block">
            <h4>3. 关键核心点 / 论文或帖子摘要</h4>
            <ol>${points.map((point) => `<li>${escapeHtml(point)}</li>`).join('')}</ol>
          </div>
          <div class="reader-block">
            <h4>4. 原文链接</h4>
            ${referenceHtml(item)}
          </div>
        </div>
      `;
    }

    function itemKeyPoints(item) {
      const points = Array.isArray(item.key_points_list)
        ? item.key_points_list
        : (Array.isArray(item.key_points) ? item.key_points : []);
      const clean = points.filter(Boolean).slice(0, 3);
      return clean.length ? clean : ['需要打开原文进一步确认方法、数据和适用边界。'];
    }

    function referenceHtml(item) {
      const url = item.reference_url || '';
      if (!url) return '<p>暂无可打开链接</p>';
      return `
        <a class="reader-reference" href="${escapeAttr(url)}" target="_blank" rel="noopener noreferrer">打开原文</a>
        <small class="reference-url">${escapeHtml(url)}</small>
      `;
    }

    function bar(label, value) {
      const score = Number(value || 0);
      const width = Math.max(0, Math.min(100, score * 10));
      return `
        <div class="bar">
          <span>${label}</span>
          <div class="bar-track"><div class="bar-fill" style="width: ${width}%"></div></div>
          <b>${score.toFixed(1)}</b>
        </div>
      `;
    }

    function countBy(list, key) {
      return list.reduce((acc, item) => {
        acc[item[key]] = (acc[item[key]] || 0) + 1;
        return acc;
      }, {});
    }

    function averageScore(list) {
      if (!list.length) return 0;
      return list.reduce((sum, item) => sum + Number(item.final_score || 0), 0) / list.length;
    }

    function option(value, label) {
      return `<option value="${escapeAttr(value)}">${escapeHtml(label)}</option>`;
    }

    function sectionButton(section, label, count) {
      return `
        <button class="category-button section-button" type="button" data-section="${escapeAttr(section)}">
          <span>${escapeHtml(label)}</span>
          <span class="count">${count}</span>
        </button>
      `;
    }

    function categoryButton(category, count) {
      return `
        <button class="category-button" type="button" data-category="${escapeAttr(category)}">
          <span>${escapeHtml(category === 'All' ? '全部' : categoryLabel(category))}</span>
          <span class="count">${count}</span>
        </button>
      `;
    }

    function categoryLabel(category) {
      return categoryLabels[category] || category;
    }

    function sectionLabel(sectionKey) {
      const section = (payload.sections || []).find((item) => item.key === sectionKey);
      return section ? section.label : '其他';
    }

    function feedTitle() {
      const parts = [];
      if (state.section !== 'All') parts.push(sectionLabel(state.section));
      if (state.category !== 'All') parts.push(categoryLabel(state.category));
      return parts.length ? parts.join(' / ') : '今日情报';
    }

    function priorityLabel(priority) {
      return priorityLabels[priority] || priority;
    }

    function sourceTypeLabel(sourceType) {
      return sourceTypeLabels[sourceType] || sourceType;
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function escapeAttr(value) {
      return escapeHtml(value).replaceAll('`', '&#096;');
    }

    init();
  </script>
</body>
