name: Daily Quant Intelligence Report

on:
  schedule:
    # 07:00 SGT (UTC+8) = 23:00 UTC previous day
    - cron: "0 23 * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Cache the SQLite database so 7-day history persists across runs.
      - name: Restore database cache
        uses: actions/cache@v4
        with:
          path: data/
          key: quant-db-${{ github.run_number }}
          restore-keys: |
            quant-db-

      - name: Run pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: deepseek-reasoner
          TZ: Asia/Singapore
        run: |
          mkdir -p data output/daily
          REPORT_DATE=$(date +%Y-%m-%d)
          echo "Report date (SGT): $REPORT_DATE"
          python run_daily.py \
            --summary-provider deepseek \
            --history-days 7 \
            --max-deepseek-items 60 \
            --report-date "$REPORT_DATE"

      - name: Commit output to git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/daily/
          git diff --cached --quiet || git commit -m "chore: daily report $(TZ=Asia/Singapore date +%Y-%m-%d)"
          git pull --rebase origin main
          git push

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prevent Jekyll processing
        run: touch output/daily/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./output/daily

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
