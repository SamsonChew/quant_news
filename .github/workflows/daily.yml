name: Daily Quant Intelligence Report

on:
  schedule:
    # 07:00 SGT (UTC+8) = 23:00 UTC previous day
    - cron: "0 23 * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Cache the SQLite database so 7-day history persists across runs.
      - name: Restore database cache
        uses: actions/cache@v4
        with:
          path: data/
          key: quant-db-${{ github.run_number }}
          restore-keys: |
            quant-db-

      - name: Run pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: deepseek-chat
        run: |
          mkdir -p data output/daily
          python run_daily.py \
            --summary-provider deepseek \
            --history-days 7

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prevent Jekyll processing
        run: touch output/daily/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./output/daily

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
