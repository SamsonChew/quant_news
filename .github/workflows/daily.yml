name: Daily Quant Intelligence Report

on:
  schedule:
    # 07:00 SGT (UTC+8) = 23:00 UTC previous day
    - cron: "0 23 * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Cache the SQLite database so 7-day history persists across runs.
      - name: Restore database cache
        uses: actions/cache@v4
        with:
          path: data/
          key: quant-db-${{ github.run_number }}
          restore-keys: |
            quant-db-

      - name: Run pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: deepseek-chat
        run: |
          mkdir -p data output/daily
          python run_daily.py \
            --summary-provider deepseek \
            --history-days 7 \
            --max-deepseek-items 60

      - name: Commit output to git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/daily/
          git diff --cached --quiet || git commit -m "chore: daily report $(date -u +%Y-%m-%d)"
          git push
